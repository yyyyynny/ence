<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>반응물이 반응하면 생성물</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --c-bg: #10141E;
    --c-surface-1: rgba(30, 35, 50, 0.6);
    --c-surface-2: rgba(30, 35, 50, 0.8);
    --c-border: rgba(136, 150, 191, 0.2);
    --c-border-active: rgba(0, 229, 255, 0.5);
    --c-text-primary: #F0F4FF;
    --c-text-secondary: #8896B0;
    --c-accent-1: #00E5FF;
    --c-accent-2: #7C3AED;
    --c-accent-3: #F59E0B;
    --c-correct: #10B981;
    --c-wrong: #EF4444;
    --c-shadow-1: rgba(0, 0, 0, 0.2);
    --c-shadow-2: rgba(255, 255, 255, 0.1);
    --font-ui: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  .light {
    --c-bg: #F0F4FF;
    --c-surface-1: rgba(255, 255, 255, 0.6);
    --c-surface-2: rgba(255, 255, 255, 0.8);
    --c-border: rgba(45, 60, 100, 0.15);
    --c-border-active: rgba(2, 132, 199, 0.5);
    --c-text-primary: #0F172A;
    --c-text-secondary: #4A5568;
    --c-accent-1: #0284C7;
    --c-accent-2: #7C3AED;
    --c-accent-3: #D97706;
    --c-correct: #059669;
    --c-wrong: #DC2626;
    --c-shadow-1: rgba(0, 0, 0, 0.1);
    --c-shadow-2: rgba(255, 255, 255, 0.5);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    background: var(--c-bg);
  }

  body {
    font-family: var(--font-ui);
    background: var(--c-bg);
    color: var(--c-text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 25% 25%, var(--c-accent-1), transparent 30%),
      radial-gradient(circle at 75% 75%, var(--c-accent-2), transparent 30%);
    opacity: 0.15;
    filter: blur(100px);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .logo {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--c-accent-1);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    color: var(--c-text-secondary);
    width: 44px;
    height: 44px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .icon-btn:hover {
    border-color: var(--c-border-active);
    color: var(--c-accent-1);
  }

  .stat-bar {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: 16px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  .stat-item { display: flex; align-items: center; gap: 8px; }
  .stat-label { font-size: 11px; color: var(--c-text-secondary); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); }
  .stat-value { font-family: var(--font-mono); font-size: 24px; font-weight: 700; line-height: 1; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .stat-value.bump { transform: scale(1.4); }
  #streakCount { color: var(--c-accent-3); }
  #totalCorrect { color: var(--c-correct); }
  #totalWrong { color: var(--c-wrong); }
  .streak-flames { font-size: 20px; }

  .mode-tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .mode-tab {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: 12px;
    color: var(--c-text-secondary);
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.4;
    backdrop-filter: blur(10px);
  }
  .mode-tab.active {
    background: var(--c-accent-1);
    border-color: var(--c-accent-1);
    color: var(--c-bg);
    box-shadow: 0 4px 20px -5px var(--c-accent-1);
  }
  .mode-tab .tab-icon {
    font-size: 20px;
    display: block;
    margin-bottom: 4px;
  }

  .question-card {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(10px);
    flex-grow: 1;
  }

  .q-label {
    font-size: 12px;
    color: var(--c-accent-1);
    font-family: var(--font-mono);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .q-sublabel {
    font-size: 14px;
    color: var(--c-text-secondary);
    font-weight: 500;
  }

  .equation-display {
    font-family: var(--font-mono);
    font-size: clamp(16px, 4.5vw, 24px);
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    line-height: 2;
    margin: auto 0;
  }

  .blank-box {
    display: inline-block;
    min-width: 48px;
    height: 48px;
    border: 2px solid var(--c-border);
    border-radius: 10px;
    background: var(--c-surface-2);
    text-align: center;
    line-height: 44px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 1em;
    font-weight: 700;
    color: var(--c-text-primary);
    padding: 0 12px;
    vertical-align: middle;
    font-family: var(--font-mono);
  }
  .blank-box.active {
    border-color: var(--c-border-active);
    box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.2);
  }
  .blank-box.correct {
    border-color: var(--c-correct);
    background: rgba(16, 185, 129, 0.15);
    color: var(--c-correct);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
  }
  .blank-box.wrong {
    border-color: var(--c-wrong);
    background: rgba(239, 68, 68, 0.15);
    color: var(--c-wrong);
    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
    animation: shake 0.4s;
  }
  .blank-box.placeholder::before {
    content: '?';
    color: var(--c-text-secondary);
    opacity: 0.5;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .eq-text { color: var(--c-text-primary); }
  .eq-arrow { color: var(--c-accent-3); font-size: 1.2em; }
  .eq-plus { color: var(--c-text-secondary); }
  sub { font-size: 0.65em; line-height: 0; vertical-align: sub; }

  .result-banner {
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 700;
    display: none;
    align-items: center;
    gap: 10px;
    margin-top: auto;
  }
  .result-banner.show { display: flex; }
  .result-banner.correct-banner { background: rgba(16, 185, 129, 0.2); color: var(--c-correct); border: 1px solid var(--c-correct); }
  .result-banner.wrong-banner { background: rgba(239, 68, 68, 0.2); color: var(--c-wrong); border: 1px solid var(--c-wrong); }
  
  .show-answer-btn {
    background: var(--c-wrong);
    color: var(--c-bg);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    margin-left: auto;
    transition: opacity 0.2s;
  }
  .show-answer-btn:hover { opacity: 0.8; }

  .keyboard-wrap {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: 20px;
    padding: 16px;
    backdrop-filter: blur(10px);
  }

  .kb-section-label {
    font-size: 10px;
    color: var(--c-text-secondary);
    font-family: var(--font-mono);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .kb-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }
  .kb-row:last-child { margin-bottom: 0; }

  .kb-key {
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-radius: 10px;
    color: var(--c-text-primary);
    font-family: var(--font-mono);
    font-size: 16px;
    font-weight: 700;
    min-height: 48px;
    min-width: 44px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: all 0.1s;
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .kb-key:active, .kb-key.pressed {
    transform: scale(0.95);
    background: var(--c-border);
  }

  .kb-key.num { color: var(--c-accent-3); }
  .kb-key.elem { color: var(--c-accent-1); }
  .kb-key.del { background: rgba(239, 68, 68, 0.2); border-color: var(--c-wrong); color: var(--c-wrong); flex-grow: 2; }
  .kb-key.confirm { background: var(--c-correct); border-color: var(--c-correct); color: #000; font-weight: 900; flex-grow: 3; }
  .kb-key.next-q { background: var(--c-accent-2); border-color: var(--c-accent-2); color: #fff; font-weight: 900; flex-grow: 3; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 100;
    backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .modal-overlay.show {
    display: flex;
    opacity: 1;
  }
  .modal-box {
    background: var(--c-surface-1);
    border: 1px solid var(--c-border);
    border-radius: 20px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    padding: 24px;
    transform: scale(0.95);
    transition: transform 0.3s;
  }
  .modal-overlay.show .modal-box {
      transform: scale(1);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--c-accent-1);
    font-family: var(--font-mono);
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--c-text-secondary);
    font-size: 28px;
    cursor: pointer;
    line-height: 1;
    width: 44px;
    height: 44px;
  }
  .modal-content {
    overflow-y: auto;
  }
  .reaction-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .reaction-item {
    background: var(--c-surface-2);
    border: 1px solid var(--c-border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 14px;
  }
  .reaction-num {
    font-size: 10px;
    color: var(--c-text-secondary);
    margin-bottom: 6px;
  }
  .reaction-name {
    font-size: 13px;
    color: var(--c-accent-3);
    font-family: var(--font-ui);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .reaction-eq {
    color: var(--c-text-primary);
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <header>
      <span id="easterEggBtn" style="cursor:pointer; font-size:12px; color:var(--wrong); margin-right:10px; font-weight:900; user-select:none;">누루ズl ㅁトパㅔ요</span>

    <div class="logo">⚗️ ChemTrainer</div>
    <div class="header-right">
      <button class="icon-btn" id="hintBtn" title="전체 반응식 보기">📋</button>
      <button class="icon-btn" id="themeBtn" title="다크/라이트 모드">🌙</button>
    </div>
  </header>

  <div class="stat-bar">
    <div class="stat-item">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="streakCount">0</div>
      <div class="streak-flames" id="streakFlames"></div>
    </div>
    <div style="flex:1"></div>
    <div class="stat-item">
      <div class="stat-label">Correct</div>
      <div class="stat-value" id="totalCorrect">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Wrong</div>
      <div class="stat-value" id="totalWrong">0</div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab" data-mode="1"><span class="tab-icon">🔢</span>계수 맞추기</button>
    <button class="mode-tab" data-mode="2"><span class="tab-icon">⚗️</span>전체 반응식</button>
    <button class="mode-tab" data-mode="3"><span class="tab-icon">🧪</span>생성물 맞추기</button>
    <button class="mode-tab" data-mode="4"><span class="tab-icon">✏️</span>빈칸 채우기</button>
  </div>

  <div class="question-card" id="questionCard">
    <div id="questionHeader">
      <div class="q-label" id="qLabel"></div>
      <div class="q-sublabel" id="qSubLabel"></div>
    </div>
    <div class="equation-display" id="equationDisplay"></div>
    <div class="result-banner" id="resultBanner"></div>
  </div>

  <div class="keyboard-wrap">
    <div class="kb-section-label">Numbers</div>
    <div class="kb-row" id="numRow"></div>
    <div class="kb-section-label">Elements</div>
    <div class="kb-row" id="elemRow"></div>
    <div class="kb-row">
      <button class="kb-key del" data-key="DEL">⌫</button>
      <button class="kb-key confirm" data-key="CONFIRM">✓ 확인</button>
      <button class="kb-key next-q" data-key="NEXT" style="display: none;">▶ 다음</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">📋 전체 반응식 목록</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-content">
      <div class="reaction-list" id="reactionList"></div>
    </div>
  </div>
</div>

<script>
const REACTIONS = [
  { name: "일산화탄소 + 산소 → 이산화탄소", reactants: [{coef:2,formula:[{sym:"CO"}]}, {coef:1,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"CO",sub:2}]}] },
  { name: "메테인 + 산소 → 이산화탄소 + 물", reactants: [{coef:1,formula:[{sym:"CH",sub:4}]}, {coef:2,formula:[{sym:"O",sub:2}]}], products: [{coef:1,formula:[{sym:"CO",sub:2}]}, {coef:2,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "구리 + 산소 → 산화구리(Ⅱ)", reactants: [{coef:2,formula:[{sym:"Cu"}]}, {coef:1,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"Cu"},{sym:"O"}]}] },
  { name: "과산화수소 → 물 + 산소", reactants: [{coef:2,formula:[{sym:"H",sub:2},{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"H",sub:2},{sym:"O"}]}, {coef:1,formula:[{sym:"O",sub:2}]}] },
  { name: "수소 + 염소 → 염화수소", reactants: [{coef:1,formula:[{sym:"H",sub:2}]}, {coef:1,formula:[{sym:"Cl",sub:2}]}], products: [{coef:2,formula:[{sym:"H"},{sym:"Cl"}]}] },
  { name: "마그네슘 + 산소 → 산화마그네슘", reactants: [{coef:2,formula:[{sym:"Mg"}]}, {coef:1,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"Mg"},{sym:"O"}]}] },
  { name: "질소 + 산소 → 이산화질소", reactants: [{coef:1,formula:[{sym:"N",sub:2}]}, {coef:2,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"N"},{sym:"O",sub:2}]}] },
  { name: "질소 + 수소 → 암모니아", reactants: [{coef:1,formula:[{sym:"N",sub:2}]}, {coef:3,formula:[{sym:"H",sub:2}]}], products: [{coef:2,formula:[{sym:"N"},{sym:"H",sub:3}]}] },
  { name: "에탄올 + 산소 → 이산화탄소 + 물", reactants: [{coef:1,formula:[{sym:"C",sub:2},{sym:"H",sub:5},{sym:"O"},{sym:"H"}]}, {coef:3,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"CO",sub:2}]}, {coef:3,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "탄산나트륨 + 염화칼슘 → 염화나트륨 + 탄산칼슘", reactants: [{coef:1,formula:[{sym:"Na",sub:2},{sym:"CO",sub:3}]}, {coef:1,formula:[{sym:"Ca"},{sym:"Cl",sub:2}]}], products: [{coef:2,formula:[{sym:"Na"},{sym:"Cl"}]}, {coef:1,formula:[{sym:"Ca"},{sym:"CO",sub:3}]}] },
  { name: "탄산수소나트륨 → 탄산나트륨 + 이산화탄소 + 물", reactants: [{coef:2,formula:[{sym:"Na"},{sym:"H"},{sym:"CO",sub:3}]}], products: [{coef:1,formula:[{sym:"Na",sub:2},{sym:"CO",sub:3}]}, {coef:1,formula:[{sym:"CO",sub:2}]}, {coef:1,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "프로페인 + 산소 → 이산화탄소 + 물", reactants: [{coef:1,formula:[{sym:"C",sub:3},{sym:"H",sub:8}]}, {coef:5,formula:[{sym:"O",sub:2}]}], products: [{coef:3,formula:[{sym:"CO",sub:2}]}, {coef:4,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "뷰테인 + 산소 → 이산화탄소 + 물", reactants: [{coef:2,formula:[{sym:"C",sub:4},{sym:"H",sub:10}]}, {coef:13,formula:[{sym:"O",sub:2}]}], products: [{coef:8,formula:[{sym:"CO",sub:2}]}, {coef:10,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "마그네슘 + 염산 → 염화마그네슘 + 수소", reactants: [{coef:1,formula:[{sym:"Mg"}]}, {coef:2,formula:[{sym:"H"},{sym:"Cl"}]}], products: [{coef:1,formula:[{sym:"Mg"},{sym:"Cl",sub:2}]}, {coef:1,formula:[{sym:"H",sub:2}]}] },
  { name: "탄산칼슘 + 염산 → 염화칼슘 + 물 + 이산화탄소", reactants: [{coef:1,formula:[{sym:"Ca"},{sym:"CO",sub:3}]}, {coef:2,formula:[{sym:"H"},{sym:"Cl"}]}], products: [{coef:1,formula:[{sym:"Ca"},{sym:"Cl",sub:2}]}, {coef:1,formula:[{sym:"H",sub:2},{sym:"O"}]}, {coef:1,formula:[{sym:"CO",sub:2}]}] },
  { name: "염화나트륨 + 질산은 → 질산나트륨 + 염화은", reactants: [{coef:1,formula:[{sym:"Na"},{sym:"Cl"}]}, {coef:1,formula:[{sym:"Ag"},{sym:"NO",sub:3}]}], products: [{coef:1,formula:[{sym:"Na"},{sym:"NO",sub:3}]}, {coef:1,formula:[{sym:"Ag"},{sym:"Cl"}]}] }
];

const ELEMENTS = ['H', 'C', 'O', 'N', 'Na', 'Mg', 'Cu', 'Cl', 'Ag', 'Ca'];

const App = {
  // --- STATE ---
  state: {
    currentMode: 1,
    score: {
      streak: 0,
      correct: 0,
      wrong: 0,
    },
    currentQuestion: null,
    isAnswerChecked: false,
    isAnswerRevealed: false,
    isDarkMode: true,
  },

  // --- DOM ELEMENTS ---
  $: {
    app: document.getElementById('app'),
    streakCount: document.getElementById('streakCount'),
    streakFlames: document.getElementById('streakFlames'),
    totalCorrect: document.getElementById('totalCorrect'),
    totalWrong: document.getElementById('totalWrong'),
    modeTabs: document.querySelector('.mode-tabs'),
    qLabel: document.getElementById('qLabel'),
    qSubLabel: document.getElementById('qSubLabel'),
    equationDisplay: document.getElementById('equationDisplay'),
    resultBanner: document.getElementById('resultBanner'),
    numRow: document.getElementById('numRow'),
    elemRow: document.getElementById('elemRow'),
    confirmBtn: document.querySelector('.kb-key.confirm'),
    nextBtn: document.querySelector('.kb-key.next-q'),
    modalOverlay: document.getElementById('modalOverlay'),
    reactionList: document.getElementById('reactionList'),
  },

  // --- INITIALIZATION ---
  init() {
    this.buildKeyboard();
    this.buildModalList();
    this.attachEventListeners();
    this.setMode(1);
  },

  // --- UI BUILDING ---
  buildKeyboard() {
    this.$.numRow.innerHTML = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0]
      .map(n => `<button class="kb-key num" data-key="NUM_${n}">${n}</button>`)
      .join('');
    this.$.elemRow.innerHTML = ELEMENTS
      .map(e => `<button class="kb-key elem" data-key="ELEM_${e}">${e}</button>`)
      .join('');
  },

  buildModalList() {
    this.$.reactionList.innerHTML = REACTIONS.map((rx, i) => {
      const formatSide = (side) => side.map(r => 
        (r.coef > 1 ? r.coef : '') + r.formula.map(p => p.sym + (p.sub ? `<sub>${p.sub}</sub>` : '')).join('')
      ).join(' + ');
      const eqStr = `${formatSide(rx.reactants)} <span class="eq-arrow">→</span> ${formatSide(rx.products)}`;
      return `
        <div class="reaction-item">
          <div class="reaction-num">#${i + 1}</div>
          <div class="reaction-name">${rx.name}</div>
          <div class="reaction-eq">${eqStr}</div>
        </div>`;
    }).join('');
  },

  // --- EVENT HANDLING ---
  attachEventListeners() {
    this.$.app.addEventListener('click', e => {
      const modeTab = e.target.closest('.mode-tab');
      const blankBox = e.target.closest('.blank-box');
      const keyBtn = e.target.closest('.kb-key');
      const themeBtn = e.target.closest('#themeBtn');
      const hintBtn = e.target.closest('#hintBtn');
      const showAnswerBtn = e.target.closest('.show-answer-btn');

      if (modeTab) this.setMode(parseInt(modeTab.dataset.mode));
      if (blankBox) this.setActiveBlank(blankBox.dataset.key);
      if (keyBtn) this.handleKeyPress(keyBtn.dataset.key);
      if (themeBtn) this.toggleTheme();
      if (hintBtn) this.showModal(true);
      if (showAnswerBtn) this.revealAnswers();
    });

    this.$.modalOverlay.addEventListener('click', e => {
      if (e.target === this.$.modalOverlay || e.target.closest('#modalClose')) {
        this.showModal(false);
      }
    });

    document.addEventListener('keydown', e => {
      if (this.$.modalOverlay.classList.contains('show')) return;
      if (e.key >= '0' && e.key <= '9') this.handleKeyPress(`NUM_${e.key}`);
      else if (e.key === 'Backspace') this.handleKeyPress('DEL');
      else if (e.key === 'Enter') {
        this.handleKeyPress(this.state.isAnswerChecked ? 'NEXT' : 'CONFIRM');
      } else {
        const key = e.key.charAt(0).toUpperCase() + e.key.slice(1);
        if (ELEMENTS.includes(key)) this.handleKeyPress(`ELEM_${key}`);
      }
    });
  },

  handleKeyPress(key) {
    if (key.startsWith('NUM_') || key.startsWith('ELEM_') || key === 'DEL') {
      if (this.state.isAnswerChecked) return;
      const q = this.state.currentQuestion;
      if (!q || !q.activeKey) return;
      
      const input = q.inputs[q.activeKey] || '';
      if (key.startsWith('NUM_')) {
        q.inputs[q.activeKey] = input + key.replace('NUM_', '');
      } else if (key.startsWith('ELEM_')) {
        q.inputs[q.activeKey] = input + key.replace('ELEM_', '');
      } else if (key === 'DEL') {
        q.inputs[q.activeKey] = input.slice(0, -1);
      }
      this.renderEquation();
    } else if (key === 'CONFIRM') {
      if (!this.state.isAnswerChecked) this.checkAnswer();
    } else if (key === 'NEXT') {
      if (this.state.isAnswerChecked) this.generateQuestion();
    }
  },

  // --- STATE MANAGEMENT ---
  setMode(mode) {
    if (this.state.currentMode === mode) return;
    this.state.currentMode = mode;
    this.$.modeTabs.querySelectorAll('.mode-tab').forEach(tab => {
      tab.classList.toggle('active', parseInt(tab.dataset.mode) === mode);
    });
    this.generateQuestion();
  },

  setActiveBlank(key) {
    if (this.state.isAnswerChecked) return;
    const q = this.state.currentQuestion;
    if (q) {
      q.activeKey = key;
      this.renderEquation();
    }
  },

  // --- CORE LOGIC ---
  generateQuestion() {
    this.state.isAnswerChecked = false;
    this.state.isAnswerRevealed = false;
    const q = {};
    const reaction = REACTIONS[Math.floor(Math.random() * REACTIONS.length)];

    const formulaToString = (chem) => {
      let str = chem.coef > 1 ? chem.coef.toString() : '';
      str += chem.formula.map(p => p.sym + (p.sub ? p.sub.toString() : '')).join('');
      return str;
    };

    q.blanks = [];
    q.inputs = {};
    q.reaction = reaction;
    q.name = reaction.name;

    switch (this.state.currentMode) {
      case 1: // 계수 맞추기
        q.type = '계수 맞추기';
        const allChemicals = [...reaction.reactants, ...reaction.products];
        const blankCount1 = Math.min(allChemicals.length - 1, Math.floor(Math.random() * 2) + 1);
        const blankIndices = new Set();
        while(blankIndices.size < blankCount1) {
            blankIndices.add(Math.floor(Math.random() * allChemicals.length));
        }
        
        q.displayReactants = reaction.reactants.map((r, i) => ({...r, isBlank: blankIndices.has(i)}));
        q.displayProducts = reaction.products.map((p, i) => ({...p, isBlank: blankIndices.has(reaction.reactants.length + i)}));

        q.displayReactants.forEach((r, i) => { if (r.isBlank) q.blanks.push({ key: `R${i}`, answer: r.coef.toString() }); });
        q.displayProducts.forEach((p, i) => { if (p.isBlank) q.blanks.push({ key: `P${i}`, answer: p.coef.toString() }); });
        break;
      
      case 2: // 전체 반응식
        q.type = '전체 반응식';
        q.displayReactants = reaction.reactants.map(() => ({ isBlank: true }));
        q.displayProducts = reaction.products.map(() => ({ isBlank: true }));
        reaction.reactants.forEach((r, i) => q.blanks.push({ key: `R${i}`, answer: formulaToString(r) }));
        reaction.products.forEach((p, i) => q.blanks.push({ key: `P${i}`, answer: formulaToString(p) }));
        break;

      case 3: // 생성물 맞추기
        q.type = '생성물 맞추기';
        q.displayReactants = reaction.reactants.map(r => ({...r, isBlank: false}));
        q.displayProducts = reaction.products.map(() => ({ isBlank: true }));
        reaction.products.forEach((p, i) => q.blanks.push({ key: `P${i}`, answer: formulaToString(p) }));
        break;
        
      case 4: // 빈칸 채우기
        q.type = '빈칸 채우기';
        const tokens = [];
        const addTokens = (chems, side) => {
            chems.forEach((chem, cIdx) => {
                if(chem.coef > 1) tokens.push({ id: `${side}${cIdx}_coef`, value: chem.coef.toString() });
                chem.formula.forEach((part, pIdx) => {
                    tokens.push({ id: `${side}${cIdx}_sym${pIdx}`, value: part.sym });
                    if(part.sub) tokens.push({ id: `${side}${cIdx}_sub${pIdx}`, value: part.sub.toString() });
                });
            });
        };
        addTokens(reaction.reactants, 'R');
        addTokens(reaction.products, 'P');
        
        const shuffledTokens = tokens.sort(() => 0.5 - Math.random());
        const blankCount4 = Math.min(tokens.length, Math.floor(Math.random() * 2) + 1);
        const blankTokens = shuffledTokens.slice(0, blankCount4);

        q.blankTokenIds = new Set(blankTokens.map(t => t.id));
        q.blanks = blankTokens.map(t => ({ key: t.id, answer: t.value }));
        break;
    }

    if (q.blanks.length > 0) {
      q.activeKey = q.blanks[0].key;
    }
    
    this.state.currentQuestion = q;
    this.renderAll();
  },

  checkAnswer() {
    const q = this.state.currentQuestion;
    if (!q) return;

    this.state.isAnswerChecked = true;
    let allCorrect = true;
    q.blanks.forEach(b => {
      if ((q.inputs[b.key] || '') !== b.answer) {
        allCorrect = false;
      }
    });

    if (allCorrect) {
      this.state.score.streak++;
      this.state.score.correct++;
    } else {
      this.state.score.streak = 0;
      this.state.score.wrong++;
    }
    
    this.renderAll(allCorrect);
  },

  revealAnswers() {
    this.state.isAnswerRevealed = true;
    this.renderEquation();
    this.renderResultBanner(false); // Re-render banner to show answers
  },

  // --- RENDERING ---
  renderAll(isCorrect = null) {
    this.renderScore();
    this.renderQuestionHeader();
    this.renderEquation();
    this.renderKeyboard();
    if (isCorrect !== null) {
      this.renderResultBanner(isCorrect);
    } else {
      this.$.resultBanner.className = 'result-banner';
    }
  },

  renderScore() {
    const { streak, correct, wrong } = this.state.score;
    const bump = (el) => {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 200);
    };
    
    if (this.$.streakCount.textContent !== streak.toString()) {
      this.$.streakCount.textContent = streak;
      bump(this.$.streakCount);
    }
    if (this.$.totalCorrect.textContent !== correct.toString()) {
      this.$.totalCorrect.textContent = correct;
      bump(this.$.totalCorrect);
    }
    if (this.$.totalWrong.textContent !== wrong.toString()) {
      this.$.totalWrong.textContent = wrong;
      bump(this.$.totalWrong);
    }

    if (streak >= 10) this.$.streakFlames.textContent = '🔥🔥🔥';
    else if (streak >= 5) this.$.streakFlames.textContent = '🔥🔥';
    else if (streak >= 3) this.$.streakFlames.textContent = '🔥';
    else this.$.streakFlames.textContent = '';
  },

  renderQuestionHeader() {
    const q = this.state.currentQuestion;
    if (!q) return;
    this.$.qLabel.textContent = `MODE ${this.state.currentMode} · ${q.type}`;
    this.$.qSubLabel.textContent = q.name;
  },

  renderEquation() {
    const q = this.state.currentQuestion;
    if (!q) {
      this.$.equationDisplay.innerHTML = '';
      return;
    }

    if (this.state.currentMode === 4) {
      this.$.equationDisplay.innerHTML = this.renderMode4Equation();
    } else {
      this.$.equationDisplay.innerHTML = this.renderModes123Equation();
    }
  },
  
  renderModes123Equation() {
    const q = this.state.currentQuestion;
    const formatChemical = (chem, keyPrefix) => {
      return chem.map((c, i) => {
        const key = `${keyPrefix}${i}`;
        let content;
        if (c.isBlank) {
          const blankData = q.blanks.find(b => b.key === key);
          content = this.renderBlankBox(key, blankData.answer);
        } else {
          content = (c.coef > 1 ? `<span class="eq-text">${c.coef}</span>` : '') + this.formatFormula(c.formula);
        }
        return (i > 0 ? '<span class="eq-plus">+</span>' : '') + content;
      }).join(' ');
    };
    const reactantsHtml = formatChemical(q.displayReactants, 'R');
    const productsHtml = formatChemical(q.displayProducts, 'P');
    return `${reactantsHtml} <span class="eq-arrow">→</span> ${productsHtml}`;
  },

  renderMode4Equation() {
    const q = this.state.currentQuestion;
    const renderSide = (chems, side) => {
      return chems.map((chem, cIdx) => {
        let html = '';
        const coefId = `${side}${cIdx}_coef`;
        if (q.blankTokenIds.has(coefId)) {
          html += this.renderBlankBox(coefId, q.blanks.find(b => b.key === coefId).answer);
        } else if (chem.coef > 1) {
          html += `<span class="eq-text">${chem.coef}</span>`;
        }
        
        chem.formula.forEach((part, pIdx) => {
          const symId = `${side}${cIdx}_sym${pIdx}`;
          const subId = `${side}${cIdx}_sub${pIdx}`;
          if (q.blankTokenIds.has(symId)) {
            html += this.renderBlankBox(symId, q.blanks.find(b => b.key === symId).answer);
          } else {
            html += `<span class="eq-text">${part.sym}</span>`;
          }
          if (q.blankTokenIds.has(subId)) {
            html += this.renderBlankBox(subId, q.blanks.find(b => b.key === subId).answer);
          } else if (part.sub) {
            html += `<sub>${part.sub}</sub>`;
          }
        });
        return html;
      }).join(' <span class="eq-plus">+</span> ');
    };

    const reactantsHtml = renderSide(q.reaction.reactants, 'R');
    const productsHtml = renderSide(q.reaction.products, 'P');
    return `${reactantsHtml} <span class="eq-arrow">→</span> ${productsHtml}`;
  },

  renderBlankBox(key, answer) {
    const q = this.state.currentQuestion;
    const input = q.inputs[key] || '';
    let classes = 'blank-box';
    if (q.activeKey === key && !this.state.isAnswerChecked) classes += ' active';
    
    let displayContent = this.formatInput(input);

    if (this.state.isAnswerChecked) {
      const isCorrect = input === answer;
      classes += isCorrect ? ' correct' : ' wrong';
      if (this.state.isAnswerRevealed && !isCorrect) {
        displayContent = this.formatInput(answer);
      }
    }
    
    if (input === '' && !this.state.isAnswerChecked) classes += ' placeholder';
    
    return `<span class="${classes}" data-key="${key}">${displayContent}</span>`;
  },

  renderResultBanner(isCorrect) {
    if (isCorrect) {
      this.$.resultBanner.className = 'result-banner correct-banner show';
      this.$.resultBanner.innerHTML = `✅ 정답입니다! 연속 ${this.state.score.streak}회 성공!`;
    } else {
      this.$.resultBanner.className = 'result-banner wrong-banner show';
      if (this.state.isAnswerRevealed) {
        const answerHtml = this.state.currentQuestion.blanks.map(b => `<strong>${this.formatInput(b.answer)}</strong>`).join(', ');
        this.$.resultBanner.innerHTML = `❌ 오답입니다. 정답: ${answerHtml}`;
      } else {
        this.$.resultBanner.innerHTML = `❌ 오답입니다. <button class="show-answer-btn">답 보기</button>`;
      }
    }
  },
  
  renderKeyboard() {
    const isChecked = this.state.isAnswerChecked;
    this.$.confirmBtn.style.display = isChecked ? 'none' : 'flex';
    this.$.nextBtn.style.display = isChecked ? 'flex' : 'none';
  },

  // --- UTILITIES ---
  formatFormula(formula) {
    return formula.map(p => p.sym + (p.sub ? `<sub>${p.sub}</sub>` : '')).join('');
  },

  formatInput(str) {
    if (!str) return '';
    return str.replace(/([A-Z][a-z]?)(\d+)/g, '$1<sub>$2</sub>');
  },

  toggleTheme() {
    this.state.isDarkMode = !this.state.isDarkMode;
    document.body.classList.toggle('light', !this.state.isDarkMode);
    document.getElementById('themeBtn').textContent = this.state.isDarkMode ? '🌙' : '☀️';
  },

  showModal(show) {
    this.$.modalOverlay.classList.toggle('show', show);
  },
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
