<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>반응물이 반응하면 생성물</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root {
    --c-bg:#10141E; --c-surface-1:rgba(30,35,50,0.6); --c-surface-2:rgba(30,35,50,0.8);
    --c-border:rgba(136,150,191,0.2); --c-border-active:rgba(0,229,255,0.5);
    --c-text-primary:#F0F4FF; --c-text-secondary:#8896B0;
    --c-accent-1:#00E5FF; --c-accent-2:#7C3AED; --c-accent-3:#F59E0B;
    --c-correct:#10B981; --c-wrong:#EF4444;
    --font-ui:'Noto Sans KR',sans-serif; --font-mono:'JetBrains Mono',monospace;
  }
  .light {
    --c-bg:#F0F4FF; --c-surface-1:rgba(255,255,255,0.6); --c-surface-2:rgba(255,255,255,0.8);
    --c-border:rgba(45,60,100,0.15); --c-border-active:rgba(2,132,199,0.5);
    --c-text-primary:#0F172A; --c-text-secondary:#4A5568;
    --c-accent-1:#0284C7; --c-accent-2:#7C3AED; --c-accent-3:#D97706;
    --c-correct:#059669; --c-wrong:#DC2626;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:var(--c-bg);}
  body{font-family:var(--font-ui);background:var(--c-bg);color:var(--c-text-primary);min-height:100vh;min-height:100dvh;transition:background .3s,color .3s;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 25% 25%,var(--c-accent-1),transparent 30%),radial-gradient(circle at 75% 75%,var(--c-accent-2),transparent 30%);opacity:.35;filter:blur(100px);pointer-events:none;z-index:0;}
  #app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:16px;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;transition:max-width 0.3s;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .logo-egg{font-size:16px;font-weight:900;color:var(--c-wrong);letter-spacing:1px;cursor:pointer;user-select:none;transition:transform .2s;}
  .logo-egg:active{transform:scale(.9);}
  .header-right{display:flex;gap:8px;align-items:center;}
  .icon-btn{background:var(--c-surface-1);border:1px solid var(--c-border);color:var(--c-text-secondary);width:52px;height:52px;border-radius:12px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(10px);}
  .icon-btn:hover{border-color:var(--c-border-active);color:var(--c-accent-1);}
  .stat-bar{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:16px;padding:14px 20px;display:flex;align-items:center;gap:16px;margin-bottom:16px;backdrop-filter:blur(10px);}
  .stat-item{display:flex;align-items:center;gap:8px;}
  .stat-label{font-size:12px;color:var(--c-text-secondary);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-mono);}
  .stat-value{font-family:var(--font-mono);font-size:26px;font-weight:700;line-height:1;transition:transform .2s;}
  .stat-value.bump{transform:scale(1.4);}
  #streakCount{color:var(--c-accent-3);}#totalCorrect{color:var(--c-correct);}#totalWrong{color:var(--c-wrong);}
  .streak-flames{font-size:22px;}
  .timer-select-wrap{display:flex;align-items:center;gap:8px;margin-bottom:16px;background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:16px;padding:12px 18px;backdrop-filter:blur(10px);}
  .timer-select-label{font-size:12px;color:var(--c-text-secondary);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
  .timer-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .timer-btn{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:10px;color:var(--c-text-secondary);font-family:var(--font-mono);font-size:14px;font-weight:700;padding:10px 16px;cursor:pointer;transition:all .2s;}
  .timer-btn.active{background:var(--c-accent-3);border-color:var(--c-accent-3);color:#000;}
  .mode-tabs{display:flex;overflow-x:auto;gap:8px;margin-bottom:16px;padding-bottom:4px;scrollbar-width:none;}
  .mode-tabs::-webkit-scrollbar{display:none;}
  .mode-tab{flex:0 0 auto;background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:12px;color:var(--c-text-secondary);padding:14px 16px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;line-height:1.4;backdrop-filter:blur(10px);}
  .mode-tab.active{background:var(--c-accent-1);border-color:var(--c-accent-1);color:var(--c-bg);}
  .mode-tab .tab-icon{font-size:20px;display:block;margin-bottom:2px;}
  .mode-tab .tab-desc{font-size:11px;display:block;font-weight:400;opacity:0.75;margin-top:2px;}
  .question-card{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:20px;padding:24px;margin-bottom:16px;min-height:180px;display:flex;flex-direction:column;gap:16px;flex-grow:1;position:relative;overflow:hidden;}
  .timer-container{position:absolute;top:0;left:0;right:0;height:5px;background:rgba(0,0,0,.2);}
  .timer-bar{height:100%;background:var(--c-accent-1);width:100%;transition:background .3s;}
  .timer-bar.danger{background:var(--c-wrong);}
  .q-label{font-size:13px;color:var(--c-accent-1);font-family:var(--font-mono);letter-spacing:1px;font-weight:700;margin-top:4px;}
  .q-sublabel{font-size:20px;color:var(--c-text-primary);font-weight:700;}
  .equation-display{font-family:var(--font-mono);font-size:clamp(16px,4.5vw,24px);display:flex;flex-wrap:wrap;align-items:center;gap:8px;line-height:2;margin:auto 0;}
  .blank-box{display:inline-block;min-width:54px;height:54px;border:2px solid var(--c-border);border-radius:10px;background:var(--c-surface-2);text-align:center;line-height:50px;cursor:pointer;transition:all .2s;font-size:1.2em;font-weight:700;color:var(--c-text-primary);padding:0 10px;font-family:var(--font-mono);}
  .blank-box.active{border-color:var(--c-border-active);box-shadow:0 0 0 4px rgba(0,229,255,.2);}
  .blank-box.correct{border-color:var(--c-correct);background:rgba(16,185,129,.15);color:var(--c-correct);}
  .blank-box.wrong{border-color:var(--c-wrong);background:rgba(239,68,68,.15);color:var(--c-wrong);animation:shake .4s;}
  .blank-box.placeholder::before{content:'?';color:var(--c-text-secondary);opacity:.5;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  .eq-text{color:var(--c-text-primary);}.eq-arrow{color:var(--c-accent-3);font-size:1.2em;margin:0 4px;}.eq-plus{color:var(--c-text-secondary);margin:0 4px;}
  sub{font-size:.65em;line-height:0;vertical-align:sub;}
  .result-banner{border-radius:12px;padding:14px 18px;font-size:15px;font-weight:700;display:none;align-items:center;gap:10px;margin-top:auto;}
  .result-banner.show{display:flex;flex-direction:column;align-items:flex-start;}
  .result-banner.correct-banner{background:rgba(16,185,129,.2);color:var(--c-correct);border:1px solid var(--c-correct);flex-direction:row;}
  .result-banner.wrong-banner{background:rgba(239,68,68,.2);color:var(--c-wrong);border:1px solid var(--c-wrong);}
  .show-answer-btn{background:var(--c-wrong);color:var(--c-bg);border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;transition:opacity .2s;align-self:flex-end;margin-top:8px;}
  .keyboard-wrap{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:20px;padding:16px;}
  .kb-section-label{font-size:11px;color:var(--c-text-secondary);font-family:var(--font-mono);text-transform:uppercase;margin-bottom:10px;margin-top:6px;}
  .kb-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .kb-key{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:10px;font-family:var(--font-mono);font-size:18px;font-weight:700;min-height:54px;min-width:44px;flex:1 1 auto;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s;}
  .kb-key:active{transform:scale(.95);}
  .kb-key.num{color:var(--c-accent-3);}.kb-key.elem{color:var(--c-text-primary);font-weight:500;}
  .kb-key.del{color:var(--c-wrong);flex-grow:2;}.kb-key.confirm{background:var(--c-correct);color:#000;flex-grow:3;}.kb-key.next-q{background:var(--c-accent-2);color:#fff;flex-grow:3;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:20px;width:100%;max-width:600px;max-height:85vh;display:flex;flex-direction:column;padding:24px;position:relative;}
  .modal-header{display:flex;justify-content:space-between;margin-bottom:16px;align-items:center;}
  .modal-title{font-size:20px;font-weight:900;color:var(--c-accent-1);}
  .modal-close{background:none;border:none;color:var(--c-text-secondary);font-size:32px;cursor:pointer;}
  .modal-content{overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px;}
  .filter-chips{display:flex;overflow-x:auto;gap:6px;margin-bottom:16px;padding-bottom:4px;scrollbar-width:none;}
  .filter-chips::-webkit-scrollbar{display:none;}
  .filter-chip{flex:0 0 auto;background:var(--c-surface-2);border:1px solid var(--c-border);color:var(--c-text-secondary);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
  .filter-chip.active{background:var(--c-accent-1);color:var(--c-bg);border-color:var(--c-accent-1);}
  .reaction-item{background:var(--c-surface-2);border-radius:12px;padding:16px;font-family:var(--font-mono);font-size:15px;display:flex;flex-direction:column;gap:10px;}
  .reaction-header{display:flex;justify-content:space-between;align-items:flex-start;}
  .reaction-name{color:var(--c-accent-3);font-size:13px;font-family:var(--font-ui);font-weight:700;}
  .reaction-eq{color:var(--c-text-primary);font-size:16px;line-height:1.6;background:rgba(0,0,0,.2);padding:14px;border-radius:8px;border:1px solid var(--c-border);text-align:center;}
  .delete-note-btn{background:rgba(239,68,68,.1);border:1px solid var(--c-wrong);color:var(--c-wrong);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:bold;}
  .retry-note-btn{background:var(--c-accent-1);border:none;color:#000;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:bold;}
  .clear-all-btn{background:var(--c-wrong);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:bold;cursor:pointer;margin-bottom:0;align-self:flex-end;}
  .cycle-wrap{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:16px;padding:12px 18px;margin-bottom:16px;backdrop-filter:blur(10px);display:flex;flex-wrap:wrap;align-items:center;gap:10px;}
  .cycle-label{font-size:12px;color:var(--c-text-secondary);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
  .cycle-btns{display:flex;gap:6px;}
  .cycle-btn{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:10px;color:var(--c-text-secondary);font-family:var(--font-ui);font-size:14px;font-weight:700;padding:10px 16px;cursor:pointer;transition:all .2s;}
  .cycle-btn.active{background:var(--c-accent-2);border-color:var(--c-accent-2);color:#fff;}
  .cycle-progress-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:140px;}
  .cycle-progress-text{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--c-text-primary);white-space:nowrap;}
  .cycle-progress-bar{flex:1;height:8px;background:var(--c-border);border-radius:4px;overflow:hidden;}
  .cycle-progress-fill{height:100%;background:linear-gradient(90deg,var(--c-accent-2),var(--c-accent-1));border-radius:4px;transition:width .3s ease;}
  .egg-particle{position:fixed;pointer-events:none;z-index:9999999;font-size:28px;animation:egg-pop .8s cubic-bezier(.25,1,.5,1) forwards;}
  @keyframes egg-pop{0%{transform:translate(-50%,-50%) scale(.5);opacity:1}100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1.5);opacity:0}}

  /* ── MODE 6 플래시카드 ── */
  #mode6Wrap{display:none;flex-direction:column;gap:14px;flex-grow:1;}
  #mode6Wrap.m6-active{display:flex;}
  .m6-opt-row{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:16px;padding:14px 18px;backdrop-filter:blur(10px);}
  .m6-opt-label{font-size:11px;color:var(--c-text-secondary);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .m6-opt-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .m6-opt-btn{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:10px;color:var(--c-text-secondary);font-size:14px;font-weight:700;padding:10px 16px;cursor:pointer;transition:all .2s;}
  .m6-opt-btn.active{background:var(--c-accent-2);border-color:var(--c-accent-2);color:#fff;}
  .m6-card-area{flex-grow:1;display:flex;flex-direction:column;gap:10px;}
  .m6-perspective{perspective:1200px;flex-grow:1;}
  .m6-flashcard{position:relative;min-height:240px;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer;user-select:none;}
  .m6-flashcard.flipped{transform:rotateY(180deg);}
  .m6-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;text-align:center;overflow:hidden;}
  .m6-front{background:var(--c-surface-1);border:2px solid var(--c-border);}
  .m6-back{background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(30,35,50,.85));border:2px solid var(--c-accent-2);transform:rotateY(180deg);}
  .m6-tag{font-size:11px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1.5px;background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:20px;padding:4px 14px;color:var(--c-text-secondary);}
  .m6-back .m6-tag{color:var(--c-accent-2);border-color:var(--c-accent-2);}
  .m6-korean{font-size:clamp(18px,5vw,26px);font-family:var(--font-ui);font-weight:700;color:var(--c-text-primary);line-height:1.5;}
  .m6-formula{font-size:clamp(16px,4.5vw,24px);font-family:var(--font-mono);font-weight:700;color:var(--c-text-primary);line-height:1.8;}
  .m6-hint{text-align:center;font-size:12px;color:var(--c-text-secondary);font-family:var(--font-mono);}
  .m6-nav{display:flex;align-items:center;gap:14px;}
  .m6-nav-btn{background:var(--c-surface-1);border:1px solid var(--c-border);border-radius:14px;color:var(--c-text-primary);font-size:32px;font-weight:900;width:60px;height:60px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;line-height:1;}
  .m6-nav-btn:hover{border-color:var(--c-accent-1);color:var(--c-accent-1);}
  .m6-nav-center{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
  .m6-counter{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--c-text-primary);}
  .m6-shuffle{background:var(--c-surface-2);border:1px solid var(--c-border);border-radius:10px;color:var(--c-text-secondary);font-size:14px;font-weight:700;padding:8px 16px;cursor:pointer;transition:all .2s;}
  .m6-shuffle:hover{border-color:var(--c-accent-3);color:var(--c-accent-3);}
  .m6-progress-bar{height:6px;background:var(--c-border);border-radius:3px;overflow:hidden;}
  .m6-progress-fill{height:100%;background:linear-gradient(90deg,var(--c-accent-2),var(--c-accent-1));border-radius:3px;transition:width .35s ease;}
  @keyframes m6Right{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
  @keyframes m6Left{from{opacity:0;transform:translateX(-50px)}to{opacity:1;transform:translateX(0)}}
  .m6-slide-r .m6-flashcard{animation:m6Right .28s ease-out;}
  .m6-slide-l .m6-flashcard{animation:m6Left .28s ease-out;}

  /* 재풀이 배너 */
  #retryBanner {
    display:none; background:var(--c-wrong); color:#fff; padding:14px 18px; border-radius:16px; margin-bottom:16px; font-weight:bold; align-items:center; justify-content:space-between; box-shadow:0 4px 12px rgba(239,68,68,0.2); font-size:15px;
  }

  /* 와이드(화면 분할) 모드 CSS Grid 재배치 */
  @media (min-width: 768px) {
    body.wide-mode #app {
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: min-content;
      align-content: start;
      row-gap: 16px;
      column-gap: 24px;
    }
    body.wide-mode #app > * { margin-bottom: 0 !important; }
    body.wide-mode header { grid-column: 1 / -1; grid-row: 1; }
    body.wide-mode #retryBanner { grid-column: 1 / -1; grid-row: 2; }
    body.wide-mode .stat-bar { grid-column: 1; grid-row: 3; }
    body.wide-mode .mode-tabs { grid-column: 2; grid-row: 3; }
    body.wide-mode .timer-select-wrap { grid-column: 1; grid-row: 4; }
    body.wide-mode .cycle-wrap { grid-column: 2; grid-row: 4; }
    body.wide-mode .question-card { grid-column: 1; grid-row: 5; min-height: 250px; }
    body.wide-mode .keyboard-wrap { grid-column: 2; grid-row: 5; }

    /* 모드 6 와이드 2열 분할 최적화 */
    body.wide-mode #mode6Wrap.m6-active {
      display: grid !important; 
      grid-column: 1 / -1;
      grid-row: 4;
      grid-template-columns: 1fr 1fr;
      column-gap: 24px;
      row-gap: 16px;
      max-width: none;
      margin: 0;
      padding: 0;
    }
    body.wide-mode .m6-card-area { grid-column: 1; grid-row: 1 / 4; min-height: 350px; }
    body.wide-mode .m6-opt-row:nth-of-type(1) { grid-column: 2; grid-row: 1; }
    body.wide-mode .m6-opt-row:nth-of-type(2) { grid-column: 2; grid-row: 2; }
    body.wide-mode .m6-nav { grid-column: 2; grid-row: 3; align-self: end; padding-bottom: 4px; }
    body.wide-mode .m6-progress-bar { grid-column: 1 / -1; grid-row: 4; }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo-egg" id="easterEggBtn">누루ズl ㅁトパㅔ요</div>
    <div class="header-right">
      <button class="icon-btn" id="layoutBtn" title="화면 분할 토글">↔️</button>
      <button class="icon-btn" id="soundBtn" title="소리 토글">🔊</button>
      <button class="icon-btn" id="hapticBtn" title="진동 토글">📳</button>
      <button class="icon-btn" id="wrongNoteBtn" title="오답 노트">📓</button>
      <button class="icon-btn" id="hintBtn" title="전체 반응식 보기">📋</button>
      <button class="icon-btn" id="themeBtn" title="다크/라이트 모드">🌙</button>
    </div>
  </header>

  <div class="stat-bar">
    <div class="stat-item">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="streakCount">0</div>
      <div class="streak-flames" id="streakFlames"></div>
    </div>
    <div style="flex:1"></div>
    <div class="stat-item"><div class="stat-label">Correct</div><div class="stat-value" id="totalCorrect">0</div></div>
    <div class="stat-item"><div class="stat-label">Wrong</div><div class="stat-value" id="totalWrong">0</div></div>
  </div>

  <div class="timer-select-wrap" id="timerSelectWrap">
    <div class="timer-select-label">⏱ 제한시간</div>
    <div class="timer-btns" id="timerBtns">
      <button class="timer-btn" data-sec="0">무제한</button>
      <button class="timer-btn" data-sec="15">15초</button>
      <button class="timer-btn active" data-sec="20">20초</button>
      <button class="timer-btn" data-sec="25">25초</button>
      <button class="timer-btn" data-sec="30">30초</button>
      <button class="timer-btn" data-sec="40">40초</button>
    </div>
  </div>

  <div class="mode-tabs">

<script>
/* ── 데이터 ── */
const DEFAULT_TIMER=20000;
const REACTIONS=[

  {name:"구리 + 산소 → 산화구리(Ⅱ)",reactants:[{coef:2,formula:[{sym:"Cu"}]},{coef:1,formula:[{sym:"O",sub:2}]}],products:[{coef:2,formula:[{sym:"Cu"},{sym:"O"}]}]},
  {name:"과산화수소 → 물 + 산소",reactants:[{coef:2,formula:[{sym:"H",sub:2},{sym:"O",sub:2}]}],products:[{coef:2,formula:[{sym:"H",sub:2},{sym:"O"}]},{coef:1,formula:[{sym:"O",sub:2}]}]},
  {name:"수소 + 염소 → 염화수소",reactants:[{coef:1,formula:[{sym:"H",sub:2}]},{coef:1,formula:[{sym:"Cl",sub:2}]}],products:[{coef:2,formula:[{sym:"H"},{sym:"Cl"}]}]},
  {name:"마그네슘 + 산소 → 산화마그네슘",reactants:[{coef:2,formula:[{sym:"Mg"}]},{coef:1,formula:[{sym:"O",sub:2}]}],products:[{coef:2,formula:[{sym:"Mg"},{sym:"O"}]}]},
  {name:"질소 + 산소 → 이산화질소",reactants:[{coef:1,formula:[{sym:"N",sub:2}]},{coef:2,formula:[{sym:"O",sub:2}]}],products:[{coef:2,formula:[{sym:"N"},{sym:"O",sub:2}]}]},
  {name:"질소 + 수소 → 암모니아",reactants:[{coef:1,formula:[{sym:"N",sub:2}]},{coef:3,formula:[{sym:"H",sub:2}]}],products:[{coef:2,formula:[{sym:"N"},{sym:"H",sub:3}]}]},
  {name:"에탄올 + 산소 → 이산화탄소 + 물",reactants:[{coef:1,formula:[{sym:"C",sub:2},{sym:"H",sub:5},{sym:"O"},{sym:"H"}]},{coef:3,formula:[{sym:"O",sub:2}]}],products:[{coef:2,formula:[{sym:"CO",sub:2}]},{coef:3,formula:[{sym:"H",sub:2},{sym:"O"}]}]},
  {name:"탄산나트륨 + 염화칼슘 → 염화나트륨 + 탄산칼슘",reactants:[{coef:1,formula:[{sym:"Na",sub:2},{sym:"CO",sub:3}]},{coef:1,formula:[{sym:"Ca"},{sym:"Cl",sub:2}]}],products:[{coef:2,formula:[{sym:"Na"},{sym:"Cl"}]},{coef:1,formula:[{sym:"Ca"},{sym:"CO",sub:3}]}]},
  {name:"탄산수소나트륨 → 탄산나트륨 + 이산화탄소 + 물",reactants:[{coef:2,formula:[{sym:"Na"},{sym:"H"},{sym:"CO",sub:3}]}],products:[{coef:1,formula:[{sym:"Na",sub:2},{sym:"CO",sub:3}]},{coef:1,formula:[{sym:"CO",sub:2}]},{coef:1,formula:[{sym:"H",sub:2},{sym:"O"}]}]},
  {name:"프로페인 + 산소 → 이산화탄소 + 물",reactants:[{coef:1,formula:[{sym:"C",sub:3},{sym:"H",sub:8}]},{coef:5,formula:[{sym:"O",sub:2}]}],products:[{coef:3,formula:[{sym:"CO",sub:2}]},{coef:4,formula:[{sym:"H",sub:2},{sym:"O"}]}]},
  {name:"뷰테인 + 산소 → 이산화탄소 + 물",reactants:[{coef:2,formula:[{sym:"C",sub:4},{sym:"H",sub:10}]},{coef:13,formula:[{sym:"O",sub:2}]}],products:[{coef:8,formula:[{sym:"CO",sub:2}]},{coef:10,formula:[{sym:"H",sub:2},{sym:"O"}]}]},
  {name:"마그네슘 + 염산 → 염화마그네슘 + 수소",reactants:[{coef:1,formula:[{sym:"Mg"}]},{coef:2,formula:[{sym:"H"},{sym:"Cl"}]}],products:[{coef:1,formula:[{sym:"Mg"},{sym:"Cl",sub:2}]},{coef:1,formula:[{sym:"H",sub:2}]}]},
  {name:"탄산칼슘 + 염산 → 염화칼슘 + 물 + 이산화탄소",reactants:[{coef:1,formula:[{sym:"Ca"},{sym:"CO",sub:3}]},{coef:2,formula:[{sym:"H"},{sym:"Cl"}]}],products:[{coef:1,formula:[{sym:"Ca"},{sym:"Cl",sub:2}]},{coef:1,formula:[{sym:"H",sub:2},{sym:"O"}]},{coef:1,formula:[{sym:"CO",sub:2}]}]},
  {name:"염화나트륨 + 질산은 → 질산나트륨 + 염화은",reactants:[{coef:1,formula:[{sym:"Na"},{sym:"Cl"}]},{coef:1,formula:[{sym:"Ag"},{sym:"NO",sub:3}]}],products:[{coef:1,formula:[{sym:"Na"},{sym:"NO",sub:3}]},{coef:1,formula:[{sym:"Ag"},{sym:"Cl"}]}]}
];
const CHEMICALS=[
  {name:"일산화탄소",formula:[{sym:"CO"}]},{name:"이산화탄소",formula:[{sym:"CO",sub:2}]},
  {name:"산소",formula:[{sym:"O",sub:2}]},{name:"물",formula:[{sym:"H",sub:2},{sym:"O"}]},
  {name:"메테인",formula:[{sym:"CH",sub:4}]},{name:"구리",formula:[{sym:"Cu"}]},
  {name:"산화구리(Ⅱ)",formula:[{sym:"Cu"},{sym:"O"}]},{name:"과산화수소",formula:[{sym:"H",sub:2},{sym:"O",sub:2}]},
  {name:"수소",formula:[{sym:"H",sub:2}]},{name:"염소",formula:[{sym:"Cl",sub:2}]},
  {name:"염화수소(염산)",formula:[{sym:"H"},{sym:"Cl"}]},{name:"마그네슘",formula:[{sym:"Mg"}]},
  {name:"산화마그네슘",formula:[{sym:"Mg"},{sym:"O"}]},{name:"염화마그네슘",formula:[{sym:"Mg"},{sym:"Cl",sub:2}]},
  {name:"질소",formula:[{sym:"N",sub:2}]},{name:"이산화질소",formula:[{sym:"N"},{sym:"O",sub:2}]},
  {name:"암모니아",formula:[{sym:"N"},{sym:"H",sub:3}]},{name:"에탄올",formula:[{sym:"C",sub:2},{sym:"H",sub:5},{sym:"O"},{sym:"H"}]},
  {name:"탄산나트륨",formula:[{sym:"Na",sub:2},{sym:"CO",sub:3}]},{name:"염화칼슘",formula:[{sym:"Ca"},{sym:"Cl",sub:2}]},
  {name:"염화나트륨",formula:[{sym:"Na"},{sym:"Cl"}]},{name:"탄산칼슘",formula:[{sym:"Ca"},{sym:"CO",sub:3}]},
  {name:"탄산수소나트륨",formula:[{sym:"Na"},{sym:"H"},{sym:"CO",sub:3}]},{name:"질산은",formula:[{sym:"Ag"},{sym:"NO",sub:3}]},
  {name:"염화은",formula:[{sym:"Ag"},{sym:"Cl"}]},{name:"질산나트륨",formula:[{sym:"Na"},{sym:"NO",sub:3}]},
  {name:"프로페인",formula:[{sym:"C",sub:3},{sym:"H",sub:8}]},{name:"뷰테인",formula:[{sym:"C",sub:4},{sym:"H",sub:10}]},
  {name:"황",formula:[{sym:"S"}]},{name:"인",formula:[{sym:"P"}]}
];
const COEF_TEMPLATES=[
  {label:"A₂ + B₂ → AB₂",gen:()=>({fmt:[{coef:1,formula:[{sym:"A",sub:2}]},{coef:2,formula:[{sym:"B",sub:2}]}],fmtP:[{coef:2,formula:[{sym:"A"},{sym:"B",sub:2}]}]})},
  {label:"A₃ + B₂ → A₆B",gen:()=>({fmt:[{coef:4,formula:[{sym:"A",sub:3}]},{coef:1,formula:[{sym:"B",sub:2}]}],fmtP:[{coef:2,formula:[{sym:"A",sub:6},{sym:"B"}]}]})},
  {label:"A₂ + B₃ → A₂B",gen:()=>({fmt:[{coef:3,formula:[{sym:"A",sub:2}]},{coef:1,formula:[{sym:"B",sub:3}]}],fmtP:[{coef:3,formula:[{sym:"A",sub:2},{sym:"B"}]}]})},
  {label:"A + B₃ → A₃B",gen:()=>({fmt:[{coef:9,formula:[{sym:"A"}]},{coef:1,formula:[{sym:"B",sub:3}]}],fmtP:[{coef:3,formula:[{sym:"A",sub:3},{sym:"B"}]}]})},
  {label:"A₃ + B → AB₂",gen:()=>({fmt:[{coef:1,formula:[{sym:"A",sub:3}]},{coef:6,formula:[{sym:"B"}]}],fmtP:[{coef:3,formula:[{sym:"A"},{sym:"B",sub:2}]}]})},
  {label:"A₂ + B → AB₃",gen:()=>({fmt:[{coef:1,formula:[{sym:"A",sub:2}]},{coef:6,formula:[{sym:"B"}]}],fmtP:[{coef:2,formula:[{sym:"A"},{sym:"B",sub:3}]}]})},
  {label:"A + B₂ → A₂B₃",gen:()=>({fmt:[{coef:4,formula:[{sym:"A"}]},{coef:3,formula:[{sym:"B",sub:2}]}],fmtP:[{coef:2,formula:[{sym:"A",sub:2},{sym:"B",sub:3}]}]})}
];
const CORE_ELEMENTS=['H','C','O','N','S','P','Na','Mg','Ca','Cu','Ag','Cl','A','B'];

/* ── 앱 ── */
const App={
  state:{
    currentMode:null,score:{streak:0,correct:0,wrong:0},
    currentQuestion:null,isAnswerChecked:false,isAnswerRevealed:false,isDarkMode:true,
    isLastWrongAttempt:false,wrongBlanks:{},wrongAlreadyPenalized:false,
    timerDuration:DEFAULT_TIMER,currentMaxTime:DEFAULT_TIMER,timerLeft:DEFAULT_TIMER,timerInterval:null,
    wrongNotes:[],noteFilter:'all',retryNoteId:null,
    isCycleMode:false,cycleQueue:[],cycleTotal:0,lastQuestionName:null,
    m6Type:'full',m6Order:'korean',m6Cards:[],m6Index:0,m6Flipped:false,
    isSoundOn:true, isHapticOn:true, isWideMode:false,
    savedCycleState:null,
    isRetryPlaylistMode:false, retryPlaylist:[]
  },
  $:{
    app:document.getElementById('app'),streakCount:document.getElementById('streakCount'),streakFlames:document.getElementById('streakFlames'),
    totalCorrect:document.getElementById('totalCorrect'),totalWrong:document.getElementById('totalWrong'),modeTabs:document.querySelector('.mode-tabs'),
    qLabel:document.getElementById('qLabel'),qSubLabel:document.getElementById('qSubLabel'),equationDisplay:document.getElementById('equationDisplay'),
    resultBanner:document.getElementById('resultBanner'),numRow:document.getElementById('numRow'),
    elemRowLabel:document.getElementById('elemRowLabel'),elemRow:document.getElementById('elemRow'),
    confirmBtn:document.querySelector('.kb-key.confirm'),nextBtn:document.querySelector('.kb-key.next-q'),
    hintModalOverlay:document.getElementById('hintModalOverlay'),wrongNoteModalOverlay:document.getElementById('wrongNoteModalOverlay'),
    reactionList:document.getElementById('reactionList'),wrongNoteList:document.getElementById('wrongNoteList'),
    timerBar:document.getElementById('timerBar'),wrongNoteFilters:document.getElementById('wrongNoteFilters'),
    questionCard:document.getElementById('questionCard'),keyboardWrap:document.getElementById('keyboardWrap'),
    timerSelectWrap:document.getElementById('timerSelectWrap'),mode6Wrap:document.getElementById('mode6Wrap'),
    cycleWrap:document.getElementById('cycleWrap'),cycleProgressWrap:document.getElementById('cycleProgressWrap'),
    cycleProgressText:document.getElementById('cycleProgressText'),cycleProgressFill:document.getElementById('cycleProgressFill'),
    soundBtn:document.getElementById('soundBtn'),hapticBtn:document.getElementById('hapticBtn'),
    layoutBtn:document.getElementById('layoutBtn')
  },

  init(){
    this.loadSettings();
    this.loadWrongNotes();
    this.buildKeyboard();
    this.buildModalList();
    this.attachEventListeners();
    document.body.addEventListener('click', () => this.initAudioContext(), {once:true});
    this.setMode(1);
  },

  loadSettings(){
    try{
      this.state.isSoundOn = localStorage.getItem('chem_sound') !== 'false';
      this.state.isHapticOn = localStorage.getItem('chem_haptic') !== 'false';
      this.state.isWideMode = localStorage.getItem('chem_wide') === 'true';
    }catch(e){}
    this.updateFeedbackBtns();
    if(this.state.isWideMode) document.body.classList.add('wide-mode');
    this.$.layoutBtn.textContent = this.state.isWideMode ? '📱' : '↔️';
    
    if(localStorage.getItem('chem_auth_v4') === 'pass') {
      document.getElementById('authOverlay').style.display = 'none';
    }
  },
  updateFeedbackBtns(){
    this.$.soundBtn.textContent = this.state.isSoundOn ? '🔊' : '🔇';
    this.$.soundBtn.style.opacity = this.state.isSoundOn ? '1' : '0.5';
    this.$.hapticBtn.textContent = this.state.isHapticOn ? '📳' : '📴';
    this.$.hapticBtn.style.opacity = this.state.isHapticOn ? '1' : '0.5';
  },
  toggleWideMode() {
    this.playSound('tap');
    this.state.isWideMode = !this.state.isWideMode;
    document.body.classList.toggle('wide-mode', this.state.isWideMode);
    try{localStorage.setItem('chem_wide', this.state.isWideMode);}catch(e){}
    this.$.layoutBtn.textContent = this.state.isWideMode ? '📱' : '↔️';
  },

  initAudioContext() {
    try {
      if(!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(window.audioCtx.state === 'suspended') window.audioCtx.resume();
    } catch(e){}
  },

  playSound(type){
    if(!this.state.isSoundOn) return;
    try {
      this.initAudioContext();
      const osc = window.audioCtx.createOscillator();
      const gain = window.audioCtx.createGain();
      osc.connect(gain); gain.connect(window.audioCtx.destination);
      const now = window.audioCtx.currentTime;
      if(type === 'tap') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
      } else if(type === 'success') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.setValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      } else if(type === 'error') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      }
    } catch(e) {}
  },
  playHaptic(type){
    if(!this.state.isHapticOn || !navigator.vibrate) return;
    try {
      if(type === 'tap') navigator.vibrate(5);
      else if(type === 'success') navigator.vibrate([10, 30, 10]);
      else if(type === 'error') navigator.vibrate([30]);
    } catch(e) {}
  },

  loadWrongNotes(){try{const d=localStorage.getItem('chem_wrong_notes_v4');this.state.wrongNotes=d?JSON.parse(d):[];}catch(e){this.state.wrongNotes=[];}},
  saveWrongNote(m,t,h,qData){
    let existing = this.state.wrongNotes.find(n => n.mode === m && n.html === h);
    if(existing){
      existing.failCount = Math.min((existing.failCount || 1) + 1, 3);
      existing.qData = qData;
      this.state.wrongNotes = this.state.wrongNotes.filter(n => n.id !== existing.id);
      this.state.wrongNotes.unshift(existing);
    }else{
      const id=Date.now().toString();
      this.state.wrongNotes.unshift({id,mode:m,title:t,html:h,qData,failCount:1});
    }
    try{localStorage.setItem('chem_wrong_notes_v4',JSON.stringify(this.state.wrongNotes));}catch(e){}
    this.renderWrongNotes();
  },
  
  // 픽스: 삭제 시 강제 종료 로직 완전히 제거
  deleteWrongNote(id){

  // 픽스: 전체 삭제 시 강제 종료 로직 완전히 제거

  startRetryPlaylist() {
    if (this.state.wrongNotes.length === 0) return;
    this.$.wrongNoteModalOverlay.classList.remove('show');
    
    if (!this.state.retryNoteId && !this.state.isRetryPlaylistMode) {
        this.state.savedCycleState = { queue: [...this.state.cycleQueue], total: this.state.cycleTotal, mode: this.state.currentMode };
    }
    
    let playlist = [...this.state.wrongNotes];
    for(let i = playlist.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
    }
    this.state.retryPlaylist = playlist;
    this.state.isRetryPlaylistMode = true;
    
    this.loadNextRetryPlaylistItem();
  },

  loadNextRetryPlaylistItem() {
    if(this.state.retryPlaylist.length === 0) {
        this.exitRetry();
        return;
    }
    const note = this.state.retryPlaylist[0];
    this.state.retryNoteId = note.id;
    
    this.state.currentMode = note.mode;
    this.$.modeTabs.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.mode)===note.mode));

    this.$.keyboardWrap.style.display = '';
    this.$.timerSelectWrap.style.display = 'none'; 
    this.$.mode6Wrap.classList.remove('m6-active');

    this.$.elemRow.style.display = note.mode===1 ? 'none' : 'flex';

    const q = JSON.parse(JSON.stringify(note.qData));
    q.inputs = {}; q.isTimedOut = false; q.cursor = {};
    if(q.blanks.length > 0) q.activeKey = q.blanks[0].key;
    this.state.currentQuestion = q;
    
    this.state.isAnswerChecked = false;
    this.state.isAnswerRevealed = false;
    this.state.isLastWrongAttempt = false;
    this.state.wrongBlanks = {};

    document.getElementById('retryBanner').style.display = 'flex';

  startRetry(id){

    }

  exitRetry(){
    this.state.retryNoteId = null;
    this.state.isRetryPlaylistMode = false;
    this.state.retryPlaylist = [];
    document.getElementById('retryBanner').style.display = 'none';
    this.$.timerSelectWrap.style.display = 'flex';
    
    const savedState = this.state.savedCycleState;
    const targetMode = savedState ? savedState.mode : this.state.currentMode;
    
    this.state.currentMode = null; 

    if(savedState){
        this.state.cycleQueue = [...savedState.queue];
        this.state.cycleTotal = savedState.total;
        this.renderCycleProgress();
    }

    this.state.savedCycleState = null;
    this.setMode(targetMode, true); 
  },

  buildKeyboard(){

  buildModalList(){
    const fmt=side=>side.map(r=>(r.coef>1?`<span class="eq-text">${r.coef}</span>`:'')+r.formula.map(p=>p.sym+(p.sub?`<sub>${p.sub}</sub>`:'')).join('')).join(' <span class="eq-plus">+</span> ');
    this.$.reactionList.innerHTML=REACTIONS.map((rx,i)=>`<div class="reaction-item"><div class="reaction-info" style="width:100%"><div class="reaction-header"><div class="reaction-name" style="margin-bottom:8px">#${i+1} ${rx.name}</div></div><div class="reaction-eq">${fmt(rx.reactants)} <span class="eq-arrow">→</span> ${fmt(rx.products)}</div></div></div>`).join('');
    this.renderWrongNotes();
  },
  renderWrongNotes(){

      if(fc === 2) { style = 'background:rgba(239,68,68,0.1); border:1px solid var(--c-wrong);'; }

      return `<div class="reaction-item" style="${style}"><div class="reaction-info" style="width:100%"><div class="reaction-header"><div class="reaction-name" style="font-size:13px;">${icon}[모드 ${n.mode}] ${n.title} <span style="color:var(--c-wrong);font-size:11px;">(오답 ${fc}회)</span></div><div style="display:flex;gap:6px;"><button class="retry-note-btn" data-id="${n.id}">단일 풀기</button><button class="delete-note-btn" data-id="${n.id}">삭제</button></div></div><div class="reaction-eq" style="border-color:var(--c-wrong)">${n.html}</div></div></div>`;
    }).join('');
  },

  initCycleQueue(){
    const mode=this.state.currentMode;
    let pool=[];
    if(mode===5) pool=CHEMICALS.map((_,i)=>i);
    else if(mode===1) pool=Array.from({length: 23}, (_,i)=>i); 
    else pool=REACTIONS.map((_,i)=>i);
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    this.state.cycleQueue=[...pool];
    this.state.cycleTotal=pool.length;
    this.renderCycleProgress();
  },

  renderCycleProgress(){
    if(!this.state.isCycleMode)return;
    const done=this.state.cycleTotal-this.state.cycleQueue.length;
    const total=this.state.cycleTotal;
    if(this.$.cycleProgressText) this.$.cycleProgressText.textContent=`${done} / ${total}`;
    if(this.$.cycleProgressFill) this.$.cycleProgressFill.style.width=`${total>0?(done/total)*100:0}%`;
  },

  startTimer(){
    clearInterval(this.state.timerInterval);
    this.state.currentMaxTime=this.state.timerDuration;this.state.timerLeft=this.state.currentMaxTime;
    this.$.timerBar.style.transition='none';this.$.timerBar.style.width='100%';this.$.timerBar.classList.remove('danger');
    
    if(this.state.timerDuration === 0) return;

    void this.$.timerBar.offsetWidth;this.$.timerBar.style.transition='width 0.1s linear, background 0.3s';
    let lt=Date.now();
    this.state.timerInterval=setInterval(()=>{
      if(document.getElementById('authOverlay').style.display !== 'none') {
        lt = Date.now();
        return;
      }
      
      if(this.state.isAnswerChecked){clearInterval(this.state.timerInterval);return;}
      const now=Date.now();this.state.timerLeft-=(now-lt);lt=now;
      if(this.state.timerLeft<=0){this.state.timerLeft=0;clearInterval(this.state.timerInterval);this.$.timerBar.style.width='0%';this.timeOutForceWrong();}
      else{const p=(this.state.timerLeft/this.state.currentMaxTime)*100;this.$.timerBar.style.width=`${p}%`;if(p<30)this.$.timerBar.classList.add('danger');}
    },50);
  },

  timeOutForceWrong(){
    this.playSound('error'); this.playHaptic('error');
    this.state.isAnswerRevealed=false;this.state.score.streak=0;this.state.score.wrong++;
    const q=this.state.currentQuestion;q.isTimedOut=true;
    
    if(!this.state.retryNoteId) {
        this.generateBeautifulWrongNote(q);
    } else {
        const note = this.state.wrongNotes.find(n => n.id === this.state.retryNoteId);
        if(note) {
            note.failCount = Math.min((note.failCount || 1) + 1, 3);
            try{localStorage.setItem('chem_wrong_notes_v4', JSON.stringify(this.state.wrongNotes));}catch(e){}
            this.renderWrongNotes();
        }
    }
    
    this.renderAll(null);
    this.$.resultBanner.className='result-banner wrong-banner show';
    this.$.resultBanner.innerHTML=`<div style="display:flex;align-items:center;width:100%;justify-content:space-between"><span><span style="color:var(--c-wrong)">⏰ 시간 초과!</span> <span style="font-weight:400;margin-left:10px">마저 답을 입력해보세요.</span></span><button class="show-answer-btn">정답 확인</button></div>`;
  },

  handleKeyPress(key){
    if(key.startsWith('NUM_')||key.startsWith('ELEM_')||key==='DEL'||key==='LEFT'||key==='RIGHT'){
      if(this.state.isAnswerChecked&&!this.state.currentQuestion?.isTimedOut)return;
      const q=this.state.currentQuestion;if(!q||!q.activeKey)return;

      const wasWrong=this.state.isLastWrongAttempt;
      if(wasWrong){
        this.state.isLastWrongAttempt=false;
        this.state.wrongBlanks={};
      }

      this.playSound('tap'); this.playHaptic('tap');
      q.cursor = q.cursor || {};
      let val = q.inputs[q.activeKey] || '';
      let pos = q.cursor[q.activeKey] !== undefined ? q.cursor[q.activeKey] : val.length;

      if(key === 'LEFT') {
          if(pos > 0) q.cursor[q.activeKey] = pos - 1;
      } else if(key === 'RIGHT') {
          if(pos < val.length) q.cursor[q.activeKey] = pos + 1;
      } else if(key.startsWith('NUM_')) {
          let char = key.replace('NUM_','');
          q.inputs[q.activeKey] = val.slice(0, pos) + char + val.slice(pos);
          q.cursor[q.activeKey] = pos + char.length;
      } else if(key.startsWith('ELEM_')) {
          let char = key.replace('ELEM_','');
          q.inputs[q.activeKey] = val.slice(0, pos) + char + val.slice(pos);
          q.cursor[q.activeKey] = pos + char.length;
      } else if(key === 'DEL') {
          if(pos > 0) {
              let dl = 1;
              let beforeCursor = val.slice(0, pos);
              if(/[a-z]$/.test(beforeCursor) && beforeCursor.length >= 2 && /[A-Z]/.test(beforeCursor.slice(-2,-1))) dl = 2;
              q.inputs[q.activeKey] = val.slice(0, pos - dl) + val.slice(pos);
              q.cursor[q.activeKey] = pos - dl;
          }
      }
      
      if(wasWrong) this.renderAll(); else this.renderEquation();
      
    }else if(key==='CONFIRM'){
        if(!this.state.isAnswerChecked||this.state.currentQuestion?.isTimedOut) {
            const q=this.state.currentQuestion;
            if(q && q.inputs[q.activeKey]){
                const emptyB = q.blanks.find(b => !(q.inputs[b.key]));
                if(emptyB) {
                    q.activeKey = emptyB.key;
                    q.cursor = q.cursor || {};
                    if(q.cursor[emptyB.key] === undefined) q.cursor[emptyB.key] = (q.inputs[emptyB.key]||'').length;
                    this.playSound('tap'); this.playHaptic('tap');
                    this.renderEquation();
                    return; 
                }
            }
            this.checkAnswer();
        }
    } else if(key==='NEXT'){
        this.playSound('tap'); this.playHaptic('tap');
        if((this.state.isAnswerChecked&&!this.state.currentQuestion?.isTimedOut)||this.state.isLastWrongAttempt) {
            if(this.state.isRetryPlaylistMode) {
                if (this.state.isAnswerRevealed || this.state.isLastWrongAttempt) {
                    let skipped = this.state.retryPlaylist.shift();
                    this.state.retryPlaylist.push(skipped);
                    this.loadNextRetryPlaylistItem();
                } else if (this.state.isAnswerChecked) {
                    this.loadNextRetryPlaylistItem();
                }
            } else if(this.state.retryNoteId) {
                this.exitRetry();
            } else {
                this.generateQuestion(); 
            }
        }
    }
  },

  setMode(mode, preserveCycle = false){
    if(this.state.retryNoteId) {
        this.state.retryNoteId = null;
        document.getElementById('retryBanner').style.display = 'none';
        this.state.savedCycleState = null;
        this.state.isRetryPlaylistMode = false;
    }
    if(this.state.currentMode===mode)return;
    
    this.state.currentMode=mode;
    this.$.modeTabs.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',parseInt(t.dataset.mode)===mode));
    const is6=mode===6;
    this.$.questionCard.style.display=is6?'none':'';
    this.$.keyboardWrap.style.display=is6?'none':'';
    this.$.timerSelectWrap.style.display=is6?'none':'';
    this.$.mode6Wrap.classList.toggle('m6-active', is6);
    this.$.cycleWrap.style.display=(!is6)?'flex':'none'; 
    
    if(!preserveCycle) this.initCycleQueue();

    if(is6){clearInterval(this.state.timerInterval);this.m6GenCards();this.m6Render();return;}
    if(mode===1){this.$.elemRowLabel.style.display='none';this.$.elemRow.style.display='none';}
    else{this.$.elemRowLabel.style.display='block';this.$.elemRow.style.display='flex';}
    this.generateQuestion();
  },

  setActiveBlank(key){
    if(this.state.isAnswerChecked&&!this.state.currentQuestion?.isTimedOut&&!this.state.isLastWrongAttempt)return;
    const q=this.state.currentQuestion;if(q){
        q.activeKey=key;
        q.cursor = q.cursor || {};
        if(q.cursor[key] === undefined) q.cursor[key] = (q.inputs[key]||'').length;
        this.playSound('tap'); this.playHaptic('tap'); this.renderEquation();
    }
  },

  generateQuestion(){
    this.state.isAnswerChecked=false;this.state.isAnswerRevealed=false;
    this.state.isLastWrongAttempt=false;this.state.wrongBlanks={};this.state.wrongAlreadyPenalized=false;
    const q={blanks:[],inputs:{},isTimedOut:false};
    const f2s=c=>{let s=c.coef>1?c.coef.toString():'';s+=c.formula.map(p=>p.sym+(p.sub?p.sub.toString():'')).join('');return s;};

    const useCycle=this.state.isCycleMode&&this.state.currentMode!==6;
    const pickIndex=(pool)=>{
      if(useCycle){
        if(this.state.cycleQueue.length===0) this.initCycleQueue(); 
        return this.state.cycleQueue.shift();
      }
      let idx=Math.floor(Math.random()*pool.length);
      if(pool.length>1&&this.state.lastQuestionName){
        let tries=0;
        while(pool[idx].name===this.state.lastQuestionName&&tries<10){idx=Math.floor(Math.random()*pool.length);tries++;}
      }
      return idx;
    };

    switch(this.state.currentMode){
      case 1:
        let isTemplate = false; let rxIdx = 0;
        if(useCycle) {
            const idx = pickIndex(Array.from({length: 23}, (_,i)=>i));
            if(idx < COEF_TEMPLATES.length) { isTemplate = true; rxIdx = idx; }
            else { isTemplate = false; rxIdx = idx - COEF_TEMPLATES.length; }
        } else {
            isTemplate = Math.random() < 0.5;
            if(isTemplate) rxIdx = Math.floor(Math.random() * COEF_TEMPLATES.length);
            else {
                rxIdx = Math.floor(Math.random() * REACTIONS.length);
                if(REACTIONS.length > 1 && this.state.lastQuestionName) {
                    let t2=0; while(REACTIONS[rxIdx].name === this.state.lastQuestionName && t2<10) { rxIdx=Math.floor(Math.random()*REACTIONS.length); t2++; }
                }
            }
        }

        if(isTemplate){
            const tmpl = COEF_TEMPLATES[rxIdx];
            const data = tmpl.gen(); q.name = tmpl.label; q.isAbstract = true;
            q.displayReactants = data.fmt.map(f=>({...f})); q.displayProducts = data.fmtP.map(f=>({...f}));
        } else {
            const rx = REACTIONS[rxIdx]; q.name = rx.name; q.isAbstract = false;
            q.displayReactants = rx.reactants.map(f=>({...f})); q.displayProducts = rx.products.map(f=>({...f}));
        }
        q.displayReactants.forEach((r,i)=>q.blanks.push({key:`R${i}`,answer:r.coef.toString()}));
        q.displayProducts.forEach((p,i)=>q.blanks.push({key:`P${i}`,answer:p.coef.toString()}));
        q.type='계수 맞추기';
        break;
      case 2:{const idx=pickIndex(REACTIONS);const rx=REACTIONS[idx];q.reaction=rx;q.name=rx.name;q.type='반응물 맞추기';q.isAbstract=false;q.displayReactants=rx.reactants.map(r=>({...r,isBlank:true}));q.displayProducts=rx.products.map(p=>({...p,isBlank:false}));rx.reactants.forEach((r,i)=>q.blanks.push({key:`R${i}`,answer:f2s(r)}));break;}
      case 3:{const idx=pickIndex(REACTIONS);const rx=REACTIONS[idx];q.reaction=rx;q.name=rx.name;q.type='생성물 맞추기';q.isAbstract=false;q.displayReactants=rx.reactants.map(r=>({...r,isBlank:false}));q.displayProducts=rx.products.map(p=>({...p,isBlank:true}));rx.products.forEach((p,i)=>q.blanks.push({key:`P${i}`,answer:f2s(p)}));break;}
      case 4:{const idx=pickIndex(REACTIONS);const rx=REACTIONS[idx];q.reaction=rx;q.name=rx.name;q.type='전체 반응식';q.isAbstract=false;q.displayReactants=rx.reactants.map(r=>({...r,isBlank:true}));q.displayProducts=rx.products.map(p=>({...p,isBlank:true}));rx.reactants.forEach((r,i)=>q.blanks.push({key:`R${i}`,answer:f2s(r)}));rx.products.forEach((p,i)=>q.blanks.push({key:`P${i}`,answer:f2s(p)}));break;}
      case 5:{const idx=pickIndex(CHEMICALS);const c=CHEMICALS[idx];q.name=c.name;q.type='화학식 암기';q.isMode5=true;q.isAbstract=false;const fs=c.formula.map(p=>p.sym+(p.sub?p.sub.toString():'')).join('');q.blanks.push({key:'M5',answer:fs});break;}
    }
    this.state.lastQuestionName=q.name;
    if(q.blanks.length>0)q.activeKey=q.blanks[0].key;
    this.state.currentQuestion=q;
    this.renderCycleProgress();
    this.renderAll();this.startTimer();
  },

  checkAnswer(){
    const q=this.state.currentQuestion;if(!q)return;
    let ok=true,ce=false;
    q.blanks.forEach(b=>{const v=q.inputs[b.key]||'';if(v!==b.answer){ok=false;if(this.state.currentMode!==1&&v==='1'+b.answer)ce=true;}});
    
    if(this.state.isRetryPlaylistMode) {
        if(ok) {
            if(q.isTimedOut) {
                this.playSound('success'); this.playHaptic('success');
                this.state.isAnswerChecked=true;
                q.isTimedOut=false; 
                clearInterval(this.state.timerInterval);
                this.renderAll('retry_timeout_correct');
            } else {
                this.playSound('success'); this.playHaptic('success');
                this.deleteWrongNote(this.state.retryNoteId);
                this.state.retryPlaylist.shift();
                this.state.isAnswerChecked=true;
                clearInterval(this.state.timerInterval);
                if (this.state.retryPlaylist.length > 0) {
                    this.renderAll('retry_playlist_correct_next');
                } else {
                    this.renderAll('retry_playlist_correct_done');
                }
            }
        } else {
            this.playSound('error'); this.playHaptic('error');
            if(!q.isTimedOut) { 
                const note = this.state.wrongNotes.find(n => n.id === this.state.retryNoteId);
                if(note) {
                    note.failCount = Math.min((note.failCount || 1) + 1, 3);
                    try{localStorage.setItem('chem_wrong_notes_v4', JSON.stringify(this.state.wrongNotes));}catch(e){}
                    this.renderWrongNotes();
                }
            }
            this.state.wrongBlanks={};
            q.blanks.forEach(b=>{if((q.inputs[b.key]||'')!==b.answer)this.state.wrongBlanks[b.key]=true;});
            q.coefOneErrorFlag=ce;
            this.state.isLastWrongAttempt=true;
            this.state.isAnswerChecked=false;
            this.renderAll(false);
        }
        return;
    }

    if(this.state.retryNoteId) {
        if(ok) {
            if(q.isTimedOut) {
                this.playSound('success'); this.playHaptic('success');
                this.state.isAnswerChecked=true;
                q.isTimedOut=false; 
                clearInterval(this.state.timerInterval);
                this.renderAll('retry_timeout_correct');
            } else {
                this.playSound('success'); this.playHaptic('success');
                this.deleteWrongNote(this.state.retryNoteId);
                this.state.retryNoteId = null;
                document.getElementById('retryBanner').style.display='none';
                this.$.timerSelectWrap.style.display='flex';
                this.state.isAnswerChecked=true;
                clearInterval(this.state.timerInterval);
                this.renderAll('retry_correct');
            }
        } else {
            this.playSound('error'); this.playHaptic('error');
            if(!q.isTimedOut) { 
                const note = this.state.wrongNotes.find(n => n.id === this.state.retryNoteId);
                if(note) {
                    note.failCount = Math.min((note.failCount || 1) + 1, 3);
                    try{localStorage.setItem('chem_wrong_notes_v4', JSON.stringify(this.state.wrongNotes));}catch(e){}
                    this.renderWrongNotes();
                }
            }
            this.state.wrongBlanks={};
            q.blanks.forEach(b=>{if((q.inputs[b.key]||'')!==b.answer)this.state.wrongBlanks[b.key]=true;});
            q.coefOneErrorFlag=ce;
            this.state.isLastWrongAttempt=true;
            this.state.isAnswerChecked=false;
            this.renderAll(false);
        }
        return;
    }

    if(q.isTimedOut){
      if(!ok){this.playSound('error'); this.playHaptic('error'); q.coefOneErrorFlag=ce;this.state.isAnswerChecked=false;this.renderAll(false);}
      else{this.playSound('success'); this.playHaptic('success'); this.state.isAnswerChecked=true;q.isTimedOut=false;this.state.isLastWrongAttempt=false;this.state.wrongBlanks={};clearInterval(this.state.timerInterval);this.renderAll('timeout_correct');}
    }else{
      clearInterval(this.state.timerInterval);
      if(ok){
        this.playSound('success'); this.playHaptic('success');
        if(!this.state.isLastWrongAttempt){this.state.score.streak++;this.state.score.correct++;}
        this.state.isLastWrongAttempt=false;this.state.wrongBlanks={};
        this.state.isAnswerChecked=true;
        this.renderAll(true);
      }else{
        this.playSound('error'); this.playHaptic('error');
        if(!this.state.wrongAlreadyPenalized){
          this.state.score.streak=0;this.state.score.wrong++;
          this.generateBeautifulWrongNote(q);
          this.state.wrongAlreadyPenalized=true;
        }
        this.state.wrongBlanks={};
        q.blanks.forEach(b=>{if((q.inputs[b.key]||'')!==b.answer)this.state.wrongBlanks[b.key]=true;});
        q.coefOneErrorFlag=ce;
        this.state.isLastWrongAttempt=true;
        this.state.isAnswerChecked=false;
        this.renderAll(false);
      }
    }
  },

  generateBeautifulWrongNote(q){
    const fmt=side=>side.map(c=>(c.coef>1?`<span class="eq-text">${c.coef}</span>`:'')+c.formula.map(p=>p.sym+(p.sub?`<sub>${p.sub}</sub>`:'')).join('')).join(' <span class="eq-plus">+</span> ');
    let h='';
    if(q.isMode5){h=`<span class="eq-text" style="font-size:20px;font-weight:bold;color:var(--c-correct)">${this.formatInput(q.blanks[0].answer)}</span>`;}
    else if(q.isAbstract===true){
      const r=q.displayReactants.map((c,i)=>{const bd=q.blanks.find(b=>b.key===`R${i}`); return(bd?`<span class="eq-text">${bd.answer}</span>`:'')+this.formatFormula(c.formula);}).join(' <span class="eq-plus">+</span> ');
      const p=q.displayProducts.map((c,i)=>{const bd=q.blanks.find(b=>b.key===`P${i}`); return(bd?`<span class="eq-text">${bd.answer}</span>`:'')+this.formatFormula(c.formula);}).join(' <span class="eq-plus">+</span> ');
      h=`${r} <span class="eq-arrow">→</span> ${p}`;
    }else{const rx=REACTIONS.find(r=>r.name===q.name);if(rx)h=`${fmt(rx.reactants)} <span class="eq-arrow">→</span> ${fmt(rx.products)}`;}
    this.saveWrongNote(this.state.currentMode,q.name,h,q);
  },

  revealAnswers(){
    this.state.isAnswerRevealed=true;this.state.isAnswerChecked=true;
    this.state.isLastWrongAttempt=false;this.state.wrongBlanks={};
    if(this.state.currentQuestion)this.state.currentQuestion.isTimedOut=false;
    clearInterval(this.state.timerInterval);this.renderAll(false);
  },

  renderAll(isCorrect=null){
    this.renderScore();this.renderQuestionHeader();this.renderEquation();this.renderKeyboard();
    if(this.state.currentQuestion&&this.state.currentQuestion.isTimedOut&&!this.state.isAnswerChecked&&isCorrect===null){}
    else if(isCorrect!==null)this.renderResultBanner(isCorrect);
    else this.$.resultBanner.className='result-banner';
  },

  renderScore(){
    const{streak,correct,wrong}=this.state.score;
    const bump=el=>{el.classList.add('bump');setTimeout(()=>el.classList.remove('bump'),200);};
    if(this.$.streakCount.textContent!==streak.toString()){this.$.streakCount.textContent=streak;bump(this.$.streakCount);}
    if(this.$.totalCorrect.textContent!==correct.toString()){this.$.totalCorrect.textContent=correct;bump(this.$.totalCorrect);}
    if(this.$.totalWrong.textContent!==wrong.toString()){this.$.totalWrong.textContent=wrong;bump(this.$.totalWrong);}
    this.$.streakFlames.textContent=streak>=10?'🔥🔥🔥':streak>=5?'🔥🔥':streak>=3?'🔥':'';
  },

  renderQuestionHeader(){const q=this.state.currentQuestion;if(!q)return;this.$.qLabel.textContent=`MODE ${this.state.currentMode} · ${q.type}`;this.$.qSubLabel.textContent=q.name;},

  renderEquation(){
    const q=this.state.currentQuestion;if(!q){this.$.equationDisplay.innerHTML='';return;}
    if(q.isMode5){this.$.equationDisplay.innerHTML=this.renderBlankBox('M5',q.blanks[0].answer);return;}
    const fc=(list,pre)=>list.map((c,i)=>{
      const key=`${pre}${i}`,bd=q.blanks.find(b=>b.key===key);
      if(this.state.currentMode===1)return bd?this.renderBlankBox(key,bd.answer)+this.formatFormula(c.formula):this.formatFormula(c.formula);
      if(c.isBlank||bd)return this.renderBlankBox(key,bd?bd.answer:'');
      return(c.coef>1?`<span class="eq-text">${c.coef}</span>`:'')+this.formatFormula(c.formula);
    }).join(' <span class="eq-plus">+</span> ');
    this.$.equationDisplay.innerHTML=`${fc(q.displayReactants,'R')} <span class="eq-arrow">→</span> ${fc(q.displayProducts,'P')}`;
  },

  formatInput(s, cursorPos = -1) {
    if(!s) s = '';
    let html = '';
    for(let i=0; i<=s.length; i++){
        if(cursorPos === i) html += '<b style="border-left:2px solid var(--c-accent-1); animation:blink 1s step-end infinite; margin-right:-2px; vertical-align:middle; display:inline-block; height:1em"></b>';
        if(i<s.length){
            let c = s[i];
            let isCoef = true;
            for(let j=0; j<=i; j++) if(/[a-zA-Z]/.test(s[j])) isCoef = false;
            if(/\d/.test(c) && !isCoef) html += `<sub>${c}</sub>`;
            else html += c;
        }
    }
    return html;
  },

  renderBlankBox(key,answer){
    const q=this.state.currentQuestion;
    let inp=q.inputs[key]||'';
    let cls='blank-box';
    let isActive = q.activeKey===key && (!this.state.isAnswerChecked||q.isTimedOut);
    
    if(isActive) cls+=' active';
    
    let disp='';
    if(this.state.isAnswerChecked&&!q.isTimedOut){
      const ok=inp===answer;cls+=ok?' correct':' wrong';
      if(this.state.isAnswerRevealed&&!ok)disp=this.formatInput(answer);
      else disp=this.formatInput(inp);
    }else if(this.state.isLastWrongAttempt&&(this.state.wrongBlanks||{})[key]){
      cls+=' wrong';
      disp=this.formatInput(inp, isActive ? (q.cursor && q.cursor[key] !== undefined ? q.cursor[key] : inp.length) : -1);
    }else{
      if(inp===''&&(!this.state.isAnswerChecked||q.isTimedOut))cls+=' placeholder';
      disp=this.formatInput(inp, isActive ? (q.cursor && q.cursor[key] !== undefined ? q.cursor[key] : inp.length) : -1);
    }
    return`<span class="${cls}" data-key="${key}">${disp}</span>`;
  },

  renderResultBanner(isCorrect){
    if(isCorrect==='retry_playlist_correct_next'){this.$.resultBanner.className='result-banner correct-banner show';this.$.resultBanner.innerHTML='✅ 완벽합니다! 다음 오답 문제로 이동하세요.';}
    else if(isCorrect==='retry_playlist_correct_done'){this.$.resultBanner.className='result-banner correct-banner show';this.$.resultBanner.innerHTML='🎉 축하합니다! 모든 오답을 정복했습니다.';}
    else if(isCorrect==='retry_timeout_correct'){this.$.resultBanner.className='result-banner correct-banner show';this.$.resultBanner.innerHTML='✅ 정답! (단, 시간 초과로 오답 노트에서 삭제되지 않음)';}
    else if(isCorrect==='retry_correct'){this.$.resultBanner.className='result-banner correct-banner show';this.$.resultBanner.innerHTML='✅ 완벽합니다! 오답 노트에서 완전히 삭제되었습니다.';}
    else if(isCorrect==='timeout_correct'){this.$.resultBanner.className='result-banner correct-banner show';this.$.resultBanner.innerHTML='✅ 늦었지만 정답입니다! (다음 문제로 넘어가세요)';}
    else if(isCorrect===true){this.$.resultBanner.className='result-banner correct-banner show';this.$.resultBanner.innerHTML=`✅ 정답입니다! 연속 ${this.state.score.streak}회 성공!`;}
    else{
      this.$.resultBanner.className='result-banner wrong-banner show';
      let w='';if(this.state.currentQuestion.coefOneErrorFlag)w=`<div style="color:var(--c-wrong);font-size:13px;margin-bottom:8px;width:100%">⚠️ 주의: 화학에서 계수 '1'은 생략해야 합니다.</div>`;
      
      if(this.state.isAnswerRevealed)this.$.resultBanner.innerHTML=`${w}<div style="display:flex;align-items:center;width:100%">❌ 오답입니다. 정답이 표시되었습니다.</div>`;
      else if(this.state.isRetryPlaylistMode) this.$.resultBanner.innerHTML=`${w}<div style="display:flex;align-items:center;width:100%;justify-content:space-between"><span>❌ 오답입니다. (계속 풀거나 건너뛰기 가능)</span><button class="show-answer-btn">정답 확인</button></div>`;
      else this.$.resultBanner.innerHTML=`${w}<div style="display:flex;align-items:center;width:100%;justify-content:space-between"><span>❌ 오답입니다.</span><button class="show-answer-btn">정답 확인</button></div>`;
    }
  },

  renderKeyboard(){
    const done=this.state.isAnswerChecked&&!this.state.currentQuestion?.isTimedOut;
    const wrongPending=this.state.isLastWrongAttempt;
    this.$.confirmBtn.style.display=done?'none':'flex';
    this.$.nextBtn.style.display=(done||wrongPending)?'flex':'none';
  },

  /* ── MODE 6 ── */
  m6Fmt(side){return side.map(r=>(r.coef>1?r.coef:'')+r.formula.map(p=>p.sym+(p.sub?`<sub>${p.sub}</sub>`:'')).join('')).join(' + ');},
  m6GenCards(){
    const t=this.state.m6Type;let cards=[];
    if(t==='full'){cards=REACTIONS.map(rx=>({ftag:'한글 반응식',fhtml:`<span class="m6-korean">${rx.name}</span>`,btag:'화학 반응식',bhtml:`<span class="m6-formula">${this.m6Fmt(rx.reactants)} → ${this.m6Fmt(rx.products)}</span>`}));}
    else if(t==='reactant'){cards=REACTIONS.map(rx=>({ftag:'반응물 이름',fhtml:`<span class="m6-korean">${rx.name}</span>`,btag:'반응물 화학식',bhtml:`<span class="m6-formula">${this.m6Fmt(rx.reactants)}</span>`}));}
    else if(t==='product'){cards=REACTIONS.map(rx=>({ftag:'생성물 이름',fhtml:`<span class="m6-korean">${rx.name}</span>`,btag:'생성물 화학식',bhtml:`<span class="m6-formula">${this.m6Fmt(rx.products)}</span>`}));}
    else{cards=CHEMICALS.map(c=>({ftag:'물질명',fhtml:`<span class="m6-korean">${c.name}</span>`,btag:'화학식',bhtml:`<span class="m6-formula">${c.formula.map(p=>p.sym+(p.sub?`<sub>${p.sub}</sub>`:'')).join('')}</span>`}));}
    this.state.m6Cards=cards;this.state.m6Index=0;this.state.m6Flipped=false;
  },
  m6Render(dir){
    const{m6Cards,m6Index,m6Order}=this.state;const card=m6Cards[m6Index];if(!card)return;
    const isKorFirst=m6Order==='korean';
    document.getElementById('m6FTag').textContent=isKorFirst?card.ftag:card.btag;
    document.getElementById('m6FContent').innerHTML=isKorFirst?card.fhtml:card.bhtml;
    document.getElementById('m6BTag').textContent=isKorFirst?card.btag:card.ftag;
    document.getElementById('m6BContent').innerHTML=isKorFirst?card.bhtml:card.fhtml;
    this.state.m6Flipped=false;document.getElementById('m6Card').classList.remove('flipped');
    document.getElementById('m6Counter').textContent=`${m6Index+1} / ${m6Cards.length}`;
    document.getElementById('m6PFill').style.width=`${((m6Index+1)/m6Cards.length)*100}%`;
    if(dir){const o=document.getElementById('m6Outer'),cls=dir==='next'?'m6-slide-r':'m6-slide-l';o.classList.remove('m6-slide-r','m6-slide-l');void o.offsetWidth;o.classList.add(cls);}
  },
  m6Flip(){this.playSound('tap'); this.playHaptic('tap'); this.state.m6Flipped=!this.state.m6Flipped;document.getElementById('m6Card').classList.toggle('flipped',this.state.m6Flipped);},
  m6Next(){this.playSound('tap'); this.state.m6Index=(this.state.m6Index+1)%this.state.m6Cards.length;this.m6Render('next');},
  m6Prev(){this.playSound('tap'); this.state.m6Index=(this.state.m6Index-1+this.state.m6Cards.length)%this.state.m6Cards.length;this.m6Render('prev');},
  m6Shuffle(){this.playSound('tap'); const c=[...this.state.m6Cards];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}this.state.m6Cards=c;this.state.m6Index=0;this.m6Render();},
  toggleTheme(){this.playSound('tap'); this.state.isDarkMode=!this.state.isDarkMode;document.body.classList.toggle('light',!this.state.isDarkMode);document.getElementById('themeBtn').textContent=this.state.isDarkMode?'🌙':'☀️';}
};

document.addEventListener('DOMContentLoaded',()=>App.init());
</script>
</body>
