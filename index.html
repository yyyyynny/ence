<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>반응물이 반응하면 생성물</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --c-bg: #10141E;
    --c-surface-1: rgba(30, 35, 50, 0.6);
    --c-surface-2: rgba(30, 35, 50, 0.8);
    --c-border: rgba(136, 150, 191, 0.2);
    --c-border-active: rgba(0, 229, 255, 0.5);
    --c-text-primary: #F0F4FF;
    --c-text-secondary: #8896B0;
    --c-accent-1: #00E5FF;
    --c-accent-2: #7C3AED;
    --c-accent-3: #F59E0B;
    --c-correct: #10B981;
    --c-wrong: #EF4444;
    --font-ui: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  .light {
    --c-bg: #F0F4FF;
    --c-surface-1: rgba(255, 255, 255, 0.6);
    --c-surface-2: rgba(255, 255, 255, 0.8);
    --c-border: rgba(45, 60, 100, 0.15);
    --c-border-active: rgba(2, 132, 199, 0.5);
    --c-text-primary: #0F172A;
    --c-text-secondary: #4A5568;
    --c-accent-1: #0284C7;
    --c-accent-2: #7C3AED;
    --c-accent-3: #D97706;
    --c-correct: #059669;
    --c-wrong: #DC2626;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { background: var(--c-bg); }
  body { font-family: var(--font-ui); background: var(--c-bg); color: var(--c-text-primary); min-height: 100vh; min-height: 100dvh; transition: background 0.3s, color 0.3s; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 25% 25%, var(--c-accent-1), transparent 30%), radial-gradient(circle at 75% 75%, var(--c-accent-2), transparent 30%); opacity: 0.15; filter: blur(100px); pointer-events: none; z-index: 0; }

  #app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

  .logo-egg { font-family: var(--font-ui); font-size: 16px; font-weight: 900; color: var(--c-wrong); letter-spacing: 1px; cursor: pointer; user-select: none; transition: transform 0.2s; }
  .logo-egg:active { transform: scale(0.9); }

  .header-right { display: flex; gap: 8px; align-items: center; }
  .icon-btn { background: var(--c-surface-1); border: 1px solid var(--c-border); color: var(--c-text-secondary); width: 44px; height: 44px; border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; backdrop-filter: blur(10px); }
  .icon-btn:hover { border-color: var(--c-border-active); color: var(--c-accent-1); }

  .stat-bar { background: var(--c-surface-1); border: 1px solid var(--c-border); border-radius: 16px; padding: 12px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 16px; backdrop-filter: blur(10px); }
  .stat-item { display: flex; align-items: center; gap: 8px; }
  .stat-label { font-size: 11px; color: var(--c-text-secondary); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-mono); }
  .stat-value { font-family: var(--font-mono); font-size: 24px; font-weight: 700; line-height: 1; transition: transform 0.2s; }
  .stat-value.bump { transform: scale(1.4); }
  #streakCount { color: var(--c-accent-3); }
  #totalCorrect { color: var(--c-correct); }
  #totalWrong { color: var(--c-wrong); }
  .streak-flames { font-size: 20px; }

  .mode-tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; }
  .mode-tabs::-webkit-scrollbar { display: none; }
  .mode-tab { flex: 0 0 auto; background: var(--c-surface-1); border: 1px solid var(--c-border); border-radius: 12px; color: var(--c-text-secondary); padding: 12px 14px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.4; backdrop-filter: blur(10px); }
  .mode-tab.active { background: var(--c-accent-1); border-color: var(--c-accent-1); color: var(--c-bg); }
  .mode-tab .tab-icon { font-size: 18px; display: block; margin-bottom: 4px; }

  .question-card { background: var(--c-surface-1); border: 1px solid var(--c-border); border-radius: 20px; padding: 24px; margin-bottom: 16px; min-height: 180px; display: flex; flex-direction: column; gap: 16px; flex-grow: 1; position: relative; overflow: hidden; }
  
  .timer-container { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: rgba(0,0,0,0.2); }
  .timer-bar { height: 100%; background: var(--c-accent-1); width: 100%; transition: background 0.3s; }
  .timer-bar.danger { background: var(--c-wrong); }

  .q-label { font-size: 12px; color: var(--c-accent-1); font-family: var(--font-mono); letter-spacing: 1px; font-weight: 700; margin-top: 4px; }
  .q-sublabel { font-size: 18px; color: var(--c-text-primary); font-weight: 700; }
  .equation-display { font-family: var(--font-mono); font-size: clamp(16px, 4.5vw, 24px); display: flex; flex-wrap: wrap; align-items: center; gap: 8px; line-height: 2; margin: auto 0; }

  .blank-box { display: inline-block; min-width: 44px; height: 44px; border: 2px solid var(--c-border); border-radius: 10px; background: var(--c-surface-2); text-align: center; line-height: 40px; cursor: pointer; transition: all 0.2s; font-size: 1em; font-weight: 700; color: var(--c-text-primary); padding: 0 10px; font-family: var(--font-mono); }
  .blank-box.active { border-color: var(--c-border-active); box-shadow: 0 0 0 4px rgba(0, 229, 255, 0.2); }
  .blank-box.correct { border-color: var(--c-correct); background: rgba(16, 185, 129, 0.15); color: var(--c-correct); }
  .blank-box.wrong { border-color: var(--c-wrong); background: rgba(239, 68, 68, 0.15); color: var(--c-wrong); animation: shake 0.4s; }
  .blank-box.placeholder::before { content: '?'; color: var(--c-text-secondary); opacity: 0.5; }

  @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }

  .eq-text { color: var(--c-text-primary); }
  .eq-arrow { color: var(--c-accent-3); font-size: 1.2em; margin: 0 4px; }
  .eq-plus { color: var(--c-text-secondary); margin: 0 4px; }
  sub { font-size: 0.65em; line-height: 0; vertical-align: sub; }

  .result-banner { border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700; display: none; align-items: center; gap: 10px; margin-top: auto; }
  .result-banner.show { display: flex; flex-direction: column; align-items: flex-start; }
  .result-banner.correct-banner { background: rgba(16, 185, 129, 0.2); color: var(--c-correct); border: 1px solid var(--c-correct); flex-direction: row; }
  .result-banner.wrong-banner { background: rgba(239, 68, 68, 0.2); color: var(--c-wrong); border: 1px solid var(--c-wrong); }
  .show-answer-btn { background: var(--c-wrong); color: var(--c-bg); border: none; border-radius: 8px; padding: 6px 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; align-self: flex-end; margin-top: 8px; }

  .keyboard-wrap { background: var(--c-surface-1); border: 1px solid var(--c-border); border-radius: 20px; padding: 16px; }
  .kb-section-label { font-size: 10px; color: var(--c-text-secondary); font-family: var(--font-mono); text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }
  .kb-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .kb-key { background: var(--c-surface-2); border: 1px solid var(--c-border); border-radius: 10px; font-family: var(--font-mono); font-size: 15px; font-weight: 700; min-height: 44px; min-width: 38px; flex: 1 1 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.1s; }
  .kb-key:active { transform: scale(0.95); }
  .kb-key.num { color: var(--c-accent-3); }
  .kb-key.elem { color: var(--c-text-primary); font-weight: 500; }
  .kb-key.del { color: var(--c-wrong); flex-grow: 2; }
  .kb-key.confirm { background: var(--c-correct); color: #000; flex-grow: 3; }
  .kb-key.next-q { background: var(--c-accent-2); color: #fff; flex-grow: 3; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--c-surface-1); border: 1px solid var(--c-border); border-radius: 20px; width: 100%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column; padding: 24px; position: relative; }
  .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; align-items: center; }
  .modal-title { font-size: 18px; font-weight: 900; color: var(--c-accent-1); }
  .modal-close { background: none; border: none; color: var(--c-text-secondary); font-size: 28px; cursor: pointer; }
  .modal-content { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; }
  
  .filter-chips { display: flex; overflow-x: auto; gap: 6px; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; }
  .filter-chips::-webkit-scrollbar { display: none; }
  .filter-chip { flex: 0 0 auto; background: var(--c-surface-2); border: 1px solid var(--c-border); color: var(--c-text-secondary); border-radius: 20px; padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .filter-chip.active { background: var(--c-accent-1); color: var(--c-bg); border-color: var(--c-accent-1); }
  
  .reaction-item { background: var(--c-surface-2); border-radius: 12px; padding: 16px; font-family: var(--font-mono); font-size: 18px; display: flex; flex-direction: column; gap: 10px; }
  .reaction-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .reaction-name { color: var(--c-accent-3); font-size: 12px; font-family: var(--font-ui); font-weight: 700; }
  .reaction-eq { color: var(--c-text-primary); font-size: 15px; line-height: 1.6; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; border: 1px solid var(--c-border); text-align: center; }
  .delete-note-btn { background: rgba(239,68,68,0.1); border: 1px solid var(--c-wrong); color: var(--c-wrong); border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
  .clear-all-btn { background: var(--c-wrong); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-weight: bold; cursor: pointer; margin-bottom: 16px; align-self: flex-end; }

  .egg-particle { position: fixed; pointer-events: none; z-index: 9999999; font-size: 24px; animation: egg-pop 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
  @keyframes egg-pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5); opacity: 0; } }
</style>
</head>
<body>

<div id="authOverlay" style="position:fixed; inset:0; z-index:99999999; background:var(--c-bg); display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family:var(--font-ui); transition: opacity 0.3s;">
  <h2 style="color:var(--c-accent-1); margin-bottom:20px;">🔒 화학 반응식 날먹 생성기</h2>
  <p style="color:var(--c-text-secondary); font-size:13px; margin-bottom:20px;">인가된 인원만 접근 가능합니다.</p>
  <input type="password" id="authInput" placeholder="Password" style="padding:12px; border-radius:8px; border:1px solid var(--c-border); background:rgba(0,0,0,0.3); color:#fff; font-size:16px; margin-bottom:16px; text-align:center; outline:none;">
  <button id="authBtn" style="padding:12px 24px; border-radius:8px; background:var(--c-accent-2); border:none; color:#fff; font-weight:bold; cursor:pointer; font-size:14px;">접속하기</button>
  <p id="authError" style="color:#ef4444; font-size:12px; margin-top:12px; display:none;">❌ 코드가 틀렸습니다 ㅋ.</p>
</div>

<div id="app">
  <header>
    <div class="logo-egg" id="easterEggBtn">누루ズl ㅁトパㅔ요</div>
    <div class="header-right">
      <button class="icon-btn" id="wrongNoteBtn" title="오답 노트">📓</button>
      <button class="icon-btn" id="hintBtn" title="전체 반응식 보기">📋</button>
      <button class="icon-btn" id="themeBtn" title="다크/라이트 모드">🌙</button>
    </div>
  </header>

  <div class="stat-bar">
    <div class="stat-item">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="streakCount">0</div>
      <div class="streak-flames" id="streakFlames"></div>
    </div>
    <div style="flex:1"></div>
    <div class="stat-item">
      <div class="stat-label">Correct</div>
      <div class="stat-value" id="totalCorrect">0</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Wrong</div>
      <div class="stat-value" id="totalWrong">0</div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab" data-mode="1"><span class="tab-icon">🔢</span>계수 맞추기</button>
    <button class="mode-tab" data-mode="2"><span class="tab-icon">🧪</span>반응물 맞추기</button>
    <button class="mode-tab" data-mode="3"><span class="tab-icon">⚗️</span>생성물 맞추기</button>
    <button class="mode-tab" data-mode="4"><span class="tab-icon">📝</span>전체 반응식</button>
    <button class="mode-tab" data-mode="5"><span class="tab-icon">🧠</span>화학식 암기</button>
  </div>

  <div class="question-card" id="questionCard">
    <div class="timer-container"><div class="timer-bar" id="timerBar"></div></div>
    <div id="questionHeader">
      <div class="q-label" id="qLabel"></div>
      <div class="q-sublabel" id="qSubLabel"></div>
    </div>
    <div class="equation-display" id="equationDisplay"></div>
    <div class="result-banner" id="resultBanner"></div>
  </div>

  <div class="keyboard-wrap">
    <div class="kb-section-label">Numbers</div>
    <div class="kb-row" id="numRow"></div>
    <div class="kb-section-label" id="elemRowLabel">Elements</div>
    <div class="kb-row" id="elemRow"></div>
    <div class="kb-row" style="margin-top: 12px;">
      <button class="kb-key del" data-key="DEL">⌫ 지우기</button>
      <button class="kb-key confirm" data-key="CONFIRM">✓ 확인</button>
      <button class="kb-key next-q" data-key="NEXT" style="display: none;">▶ 다음 문제</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="hintModalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">📋 전체 반응식 목록</div>
      <button class="modal-close" id="hintModalClose">✕</button>
    </div>
    <div class="modal-content" id="reactionList"></div>
  </div>
</div>

<div class="modal-overlay" id="wrongNoteModalOverlay">
  <div class="modal-box" style="height: 90vh;">
    <div class="modal-header">
      <div class="modal-title">📓 오답 노트</div>
      <button class="modal-close" id="wrongNoteModalClose">✕</button>
    </div>
    <div class="filter-chips" id="wrongNoteFilters">
      <button class="filter-chip active" data-filter="all">전체</button>
      <button class="filter-chip" data-filter="1">모드 1</button>
      <button class="filter-chip" data-filter="2">모드 2</button>
      <button class="filter-chip" data-filter="3">모드 3</button>
      <button class="filter-chip" data-filter="4">모드 4</button>
      <button class="filter-chip" data-filter="5">모드 5</button>
    </div>
    <button class="clear-all-btn" id="clearAllNotesBtn">🗑 전체 삭제</button>
    <div class="modal-content" id="wrongNoteList"></div>
  </div>
</div>

<script>
(function() {
  const overlay = document.getElementById('authOverlay');
  const input = document.getElementById('authInput');
  const btn = document.getElementById('authBtn');
  const error = document.getElementById('authError');
  const CORRECT_PASSWORD = "yyyyynny"; 

  try { if(localStorage.getItem('chem_auth') === 'true') overlay.style.display = 'none'; } catch(e) {}

  const checkAuth = () => {
    const typedPassword = input.value.trim().toLowerCase();
    if(typedPassword === CORRECT_PASSWORD.toLowerCase()) {
      try { localStorage.setItem('chem_auth', 'true'); } catch(e) {}
      overlay.style.opacity = '0';
      setTimeout(() => overlay.style.display = 'none', 300);
    } else {
      error.style.display = 'block';
      input.value = ''; input.focus();
    }
  };

  btn.addEventListener('click', checkAuth);
  input.addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAuth(); });

  document.getElementById('easterEggBtn').addEventListener('click', (e) => {
    e.preventDefault();
    const x = e.clientX || (e.touches ? e.touches[0].clientX : window.innerWidth/2);
    const y = e.clientY || (e.touches ? e.touches[0].clientY : 50);
    const emojis = ['🎆', '🌟', '✨', '💖', '🎉', '🌸', '🐰'];

    for(let i=0; i<35; i++) {
      const p = document.createElement('div');
      p.className = 'egg-particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = x + 'px'; p.style.top = y + 'px';
      const angle = Math.random() * Math.PI * 2;
      const velocity = 60 + Math.random() * 120;
      p.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }

    const flash = document.createElement('div');
    Object.assign(flash.style, {
      position: 'fixed', inset: 0, zIndex: 9999998,
      background: 'linear-gradient(135deg, rgba(255,182,193,0.9), rgba(200,162,200,0.9))',
      display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column',
      opacity: 0, transition: 'opacity 0.5s ease-out', pointerEvents: 'none'
    });
    flash.innerHTML = '<div style="font-size:80px; animation:shake 0.5s infinite;">💖 깜짝이야! 💖</div>';
    document.body.appendChild(flash);
    
    setTimeout(() => { flash.style.opacity = 1; }, 50);
    setTimeout(() => {
      flash.style.opacity = 0;
      setTimeout(() => flash.remove(), 500);
      try { localStorage.removeItem('chem_auth'); } catch(e) {}
      input.value = ''; error.style.display = 'none';
      overlay.style.display = 'flex';
      setTimeout(() => overlay.style.opacity = '1', 50);
    }, 1200);
  });
})();

const REACTIONS = [
  { name: "일산화탄소 + 산소 → 이산화탄소", reactants: [{coef:2,formula:[{sym:"CO"}]}, {coef:1,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"CO",sub:2}]}] },
  { name: "메테인 + 산소 → 이산화탄소 + 물", reactants: [{coef:1,formula:[{sym:"CH",sub:4}]}, {coef:2,formula:[{sym:"O",sub:2}]}], products: [{coef:1,formula:[{sym:"CO",sub:2}]}, {coef:2,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "구리 + 산소 → 산화구리(Ⅱ)", reactants: [{coef:2,formula:[{sym:"Cu"}]}, {coef:1,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"Cu"},{sym:"O"}]}] },
  { name: "과산화수소 → 물 + 산소", reactants: [{coef:2,formula:[{sym:"H",sub:2},{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"H",sub:2},{sym:"O"}]}, {coef:1,formula:[{sym:"O",sub:2}]}] },
  { name: "수소 + 염소 → 염화수소", reactants: [{coef:1,formula:[{sym:"H",sub:2}]}, {coef:1,formula:[{sym:"Cl",sub:2}]}], products: [{coef:2,formula:[{sym:"H"},{sym:"Cl"}]}] },
  { name: "마그네슘 + 산소 → 산화마그네슘", reactants: [{coef:2,formula:[{sym:"Mg"}]}, {coef:1,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"Mg"},{sym:"O"}]}] },
  { name: "질소 + 산소 → 이산화질소", reactants: [{coef:1,formula:[{sym:"N",sub:2}]}, {coef:2,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"N"},{sym:"O",sub:2}]}] },
  { name: "질소 + 수소 → 암모니아", reactants: [{coef:1,formula:[{sym:"N",sub:2}]}, {coef:3,formula:[{sym:"H",sub:2}]}], products: [{coef:2,formula:[{sym:"N"},{sym:"H",sub:3}]}] },
  { name: "에탄올 + 산소 → 이산화탄소 + 물", reactants: [{coef:1,formula:[{sym:"C",sub:2},{sym:"H",sub:5},{sym:"O"},{sym:"H"}]}, {coef:3,formula:[{sym:"O",sub:2}]}], products: [{coef:2,formula:[{sym:"CO",sub:2}]}, {coef:3,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "탄산나트륨 + 염화칼슘 → 염화나트륨 + 탄산칼슘", reactants: [{coef:1,formula:[{sym:"Na",sub:2},{sym:"CO",sub:3}]}, {coef:1,formula:[{sym:"Ca"},{sym:"Cl",sub:2}]}], products: [{coef:2,formula:[{sym:"Na"},{sym:"Cl"}]}, {coef:1,formula:[{sym:"Ca"},{sym:"CO",sub:3}]}] },
  { name: "탄산수소나트륨 → 탄산나트륨 + 이산화탄소 + 물", reactants: [{coef:2,formula:[{sym:"Na"},{sym:"H"},{sym:"CO",sub:3}]}], products: [{coef:1,formula:[{sym:"Na",sub:2},{sym:"CO",sub:3}]}, {coef:1,formula:[{sym:"CO",sub:2}]}, {coef:1,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "프로페인 + 산소 → 이산화탄소 + 물", reactants: [{coef:1,formula:[{sym:"C",sub:3},{sym:"H",sub:8}]}, {coef:5,formula:[{sym:"O",sub:2}]}], products: [{coef:3,formula:[{sym:"CO",sub:2}]}, {coef:4,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "뷰테인 + 산소 → 이산화탄소 + 물", reactants: [{coef:2,formula:[{sym:"C",sub:4},{sym:"H",sub:10}]}, {coef:13,formula:[{sym:"O",sub:2}]}], products: [{coef:8,formula:[{sym:"CO",sub:2}]}, {coef:10,formula:[{sym:"H",sub:2},{sym:"O"}]}] },
  { name: "마그네슘 + 염산 → 염화마그네슘 + 수소", reactants: [{coef:1,formula:[{sym:"Mg"}]}, {coef:2,formula:[{sym:"H"},{sym:"Cl"}]}], products: [{coef:1,formula:[{sym:"Mg"},{sym:"Cl",sub:2}]}, {coef:1,formula:[{sym:"H",sub:2}]}] },
  { name: "탄산칼슘 + 염산 → 염화칼슘 + 물 + 이산화탄소", reactants: [{coef:1,formula:[{sym:"Ca"},{sym:"CO",sub:3}]}, {coef:2,formula:[{sym:"H"},{sym:"Cl"}]}], products: [{coef:1,formula:[{sym:"Ca"},{sym:"Cl",sub:2}]}, {coef:1,formula:[{sym:"H",sub:2},{sym:"O"}]}, {coef:1,formula:[{sym:"CO",sub:2}]}] },
  { name: "염화나트륨 + 질산은 → 질산나트륨 + 염화은", reactants: [{coef:1,formula:[{sym:"Na"},{sym:"Cl"}]}, {coef:1,formula:[{sym:"Ag"},{sym:"NO",sub:3}]}], products: [{coef:1,formula:[{sym:"Na"},{sym:"NO",sub:3}]}, {coef:1,formula:[{sym:"Ag"},{sym:"Cl"}]}] }
];

const CHEMICALS = [
  { name: "일산화탄소", formula: [{sym:"CO"}] }, { name: "이산화탄소", formula: [{sym:"CO",sub:2}] },
  { name: "산소", formula: [{sym:"O",sub:2}] }, { name: "물", formula: [{sym:"H",sub:2},{sym:"O"}] },
  { name: "메테인", formula: [{sym:"CH",sub:4}] }, { name: "구리", formula: [{sym:"Cu"}] },
  { name: "산화구리(Ⅱ)", formula: [{sym:"Cu"},{sym:"O"}] }, { name: "과산화수소", formula: [{sym:"H",sub:2},{sym:"O",sub:2}] },
  { name: "수소", formula: [{sym:"H",sub:2}] }, { name: "염소", formula: [{sym:"Cl",sub:2}] },
  { name: "염화수소(염산)", formula: [{sym:"H"},{sym:"Cl"}] }, { name: "마그네슘", formula: [{sym:"Mg"}] },
  { name: "산화마그네슘", formula: [{sym:"Mg"},{sym:"O"}] }, { name: "염화마그네슘", formula: [{sym:"Mg"},{sym:"Cl",sub:2}] },
  { name: "질소", formula: [{sym:"N",sub:2}] }, { name: "이산화질소", formula: [{sym:"N"},{sym:"O",sub:2}] },
  { name: "암모니아", formula: [{sym:"N"},{sym:"H",sub:3}] }, { name: "에탄올", formula: [{sym:"C",sub:2},{sym:"H",sub:5},{sym:"O"},{sym:"H"}] },
  { name: "탄산나트륨", formula: [{sym:"Na",sub:2},{sym:"CO",sub:3}] }, { name: "염화칼슘", formula: [{sym:"Ca"},{sym:"Cl",sub:2}] },
  { name: "염화나트륨", formula: [{sym:"Na"},{sym:"Cl"}] }, { name: "탄산칼슘", formula: [{sym:"Ca"},{sym:"CO",sub:3}] },
  { name: "탄산수소나트륨", formula: [{sym:"Na"},{sym:"H"},{sym:"CO",sub:3}] }, { name: "질산은", formula: [{sym:"Ag"},{sym:"NO",sub:3}] },
  { name: "염화은", formula: [{sym:"Ag"},{sym:"Cl"}] }, { name: "질산나트륨", formula: [{sym:"Na"},{sym:"NO",sub:3}] },
  { name: "프로페인", formula: [{sym:"C",sub:3},{sym:"H",sub:8}] }, { name: "뷰테인", formula: [{sym:"C",sub:4},{sym:"H",sub:10}] },
  { name: "황", formula: [{sym:"S"}] }, { name: "인", formula: [{sym:"P"}] }
];

const COEF_TEMPLATES = [
  { label: "A₂ + B₂ → AB₂", gen: () => { return { fmt:[ {coef:1,formula:[{sym:"A",sub:2}]}, {coef:2,formula:[{sym:"B",sub:2}]} ], fmtP:[ {coef:2,formula:[{sym:"A"},{sym:"B",sub:2}]} ]}; } },
  { label: "A₃ + B₂ → A₆B", gen: () => { return { fmt:[ {coef:4,formula:[{sym:"A",sub:3}]}, {coef:1,formula:[{sym:"B",sub:2}]} ], fmtP:[ {coef:2,formula:[{sym:"A",sub:6},{sym:"B"}]} ]}; } },
  { label: "A₂ + B₃ → A₂B", gen: () => { return { fmt:[ {coef:3,formula:[{sym:"A",sub:2}]}, {coef:1,formula:[{sym:"B",sub:3}]} ], fmtP:[ {coef:3,formula:[{sym:"A",sub:2},{sym:"B"}]} ]}; } },
  { label: "A + B₃ → A₃B", gen: () => { return { fmt:[ {coef:9,formula:[{sym:"A"}]}, {coef:1,formula:[{sym:"B",sub:3}]} ], fmtP:[ {coef:3,formula:[{sym:"A",sub:3},{sym:"B"}]} ]}; } },
  { label: "A₃ + B → AB₂", gen: () => { return { fmt:[ {coef:1,formula:[{sym:"A",sub:3}]}, {coef:6,formula:[{sym:"B"}]} ], fmtP:[ {coef:3,formula:[{sym:"A"},{sym:"B",sub:2}]} ]}; } },
  { label: "A₂ + B → AB₃", gen: () => { return { fmt:[ {coef:1,formula:[{sym:"A",sub:2}]}, {coef:6,formula:[{sym:"B"}]} ], fmtP:[ {coef:2,formula:[{sym:"A"},{sym:"B",sub:3}]} ]}; } },
  { label: "A + B₂ → A₂B₃", gen: () => { return { fmt:[ {coef:4,formula:[{sym:"A"}]}, {coef:3,formula:[{sym:"B",sub:2}]} ], fmtP:[ {coef:2,formula:[{sym:"A",sub:2},{sym:"B",sub:3}]} ]}; } }
];

const CORE_ELEMENTS = ['H', 'C', 'O', 'N', 'S', 'P', 'Na', 'Mg', 'Ca', 'Cu', 'Ag', 'Cl', 'A', 'B'];

const App = {
  state: { 
    currentMode: null, 
    score: { streak: 0, correct: 0, wrong: 0 }, 
    currentQuestion: null, 
    isAnswerChecked: false, 
    isAnswerRevealed: false, 
    isDarkMode: true,
    timerLeft: 15000,
    timerInterval: null,
    wrongNotes: [],
    noteFilter: 'all'
  },
  $: {
    app: document.getElementById('app'), streakCount: document.getElementById('streakCount'), streakFlames: document.getElementById('streakFlames'),
    totalCorrect: document.getElementById('totalCorrect'), totalWrong: document.getElementById('totalWrong'), modeTabs: document.querySelector('.mode-tabs'),
    qLabel: document.getElementById('qLabel'), qSubLabel: document.getElementById('qSubLabel'), equationDisplay: document.getElementById('equationDisplay'),
    resultBanner: document.getElementById('resultBanner'), numRow: document.getElementById('numRow'), 
    elemRowLabel: document.getElementById('elemRowLabel'), elemRow: document.getElementById('elemRow'),
    confirmBtn: document.querySelector('.kb-key.confirm'), nextBtn: document.querySelector('.kb-key.next-q'), 
    hintModalOverlay: document.getElementById('hintModalOverlay'), wrongNoteModalOverlay: document.getElementById('wrongNoteModalOverlay'),
    reactionList: document.getElementById('reactionList'), wrongNoteList: document.getElementById('wrongNoteList'),
    timerBar: document.getElementById('timerBar'), wrongNoteFilters: document.getElementById('wrongNoteFilters')
  },

  init() { 
    this.loadWrongNotes();
    this.buildKeyboard(); 
    this.buildModalList(); 
    this.attachEventListeners(); 
    this.setMode(1); 
  },

  loadWrongNotes() {
    try {
      const data = localStorage.getItem('chem_wrong_notes_v3');
      this.state.wrongNotes = data ? JSON.parse(data) : [];
    } catch(e) { this.state.wrongNotes = []; }
  },

  saveWrongNote(modeNum, title, equationHtml) {
    const id = Date.now().toString();
    this.state.wrongNotes.unshift({ id, mode: modeNum, title, html: equationHtml });
    try { localStorage.setItem('chem_wrong_notes_v3', JSON.stringify(this.state.wrongNotes)); } catch(e) {}
    this.renderWrongNotes();
  },

  deleteWrongNote(id) {
    this.state.wrongNotes = this.state.wrongNotes.filter(n => n.id !== id);
    try { localStorage.setItem('chem_wrong_notes_v3', JSON.stringify(this.state.wrongNotes)); } catch(e) {}
    this.renderWrongNotes();
  },

  clearWrongNotes() {
    if(!confirm("오답 노트를 전부 삭제하시겠습니까?")) return;
    this.state.wrongNotes = [];
    try { localStorage.removeItem('chem_wrong_notes_v3'); } catch(e) {}
    this.renderWrongNotes();
  },

  buildKeyboard() {
    this.$.numRow.innerHTML = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0].map(n => `<button class="kb-key num" data-key="NUM_${n}">${n}</button>`).join('');
    this.$.elemRow.innerHTML = CORE_ELEMENTS.map(e => `<button class="kb-key elem" data-key="ELEM_${e}">${e}</button>`).join('');
  },

  buildModalList() {
    this.$.reactionList.innerHTML = REACTIONS.map((rx, i) => {
      const formatSide = (side) => side.map(r => (r.coef > 1 ? `<span class="eq-text">${r.coef}</span>` : '') + r.formula.map(p => p.sym + (p.sub ? `<sub>${p.sub}</sub>` : '')).join('')).join(' <span class="eq-plus">+</span> ');
      return `<div class="reaction-item"><div class="reaction-info" style="width:100%;"><div class="reaction-header"><div class="reaction-name" style="margin-bottom:8px;">#${i + 1} ${rx.name}</div></div><div class="reaction-eq">${formatSide(rx.reactants)} <span class="eq-arrow">→</span> ${formatSide(rx.products)}</div></div></div>`;
    }).join('');
    this.renderWrongNotes();
  },

  renderWrongNotes() {
    let filtered = this.state.wrongNotes;
    if (this.state.noteFilter !== 'all') {
      filtered = filtered.filter(n => n.mode.toString() === this.state.noteFilter);
    }
    
    if (filtered.length === 0) {
      this.$.wrongNoteList.innerHTML = `<p style="color:var(--c-text-secondary); text-align:center; padding: 40px 20px;">이 모드의 오답 기록이 없습니다.</p>`;
      return;
    }
    
    this.$.wrongNoteList.innerHTML = filtered.map(n => `
      <div class="reaction-item">
        <div class="reaction-info" style="width:100%;">
          <div class="reaction-header">
            <div class="reaction-name">[모드 ${n.mode}] ${n.title}</div>
            <button class="delete-note-btn" data-id="${n.id}">삭제</button>
          </div>
          <div class="reaction-eq" style="border-color:var(--c-wrong);">${n.html}</div>
        </div>
      </div>
    `).join('');
  },

  attachEventListeners() {
    this.$.app.addEventListener('click', e => {
      const modeTab = e.target.closest('.mode-tab'); const blankBox = e.target.closest('.blank-box'); const keyBtn = e.target.closest('.kb-key');
      const themeBtn = e.target.closest('#themeBtn'); const hintBtn = e.target.closest('#hintBtn'); const wrongNoteBtn = e.target.closest('#wrongNoteBtn');
      const showAnswerBtn = e.target.closest('.show-answer-btn');
      
      if (modeTab) this.setMode(parseInt(modeTab.dataset.mode));
      if (blankBox) this.setActiveBlank(blankBox.dataset.key);
      if (keyBtn) this.handleKeyPress(keyBtn.dataset.key);
      if (themeBtn) this.toggleTheme();
      if (hintBtn) this.$.hintModalOverlay.classList.add('show');
      if (wrongNoteBtn) { this.renderWrongNotes(); this.$.wrongNoteModalOverlay.classList.add('show'); }
      if (showAnswerBtn) this.revealAnswers();
    });

    this.$.wrongNoteFilters.addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (chip) {
        this.$.wrongNoteFilters.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        this.state.noteFilter = chip.dataset.filter;
        this.renderWrongNotes();
      }
    });

    document.getElementById('hintModalClose').addEventListener('click', () => this.$.hintModalOverlay.classList.remove('show'));
    document.getElementById('wrongNoteModalClose').addEventListener('click', () => this.$.wrongNoteModalOverlay.classList.remove('show'));
    document.getElementById('clearAllNotesBtn').addEventListener('click', () => this.clearWrongNotes());
    
    this.$.wrongNoteList.addEventListener('click', e => {
      if(e.target.classList.contains('delete-note-btn')) this.deleteWrongNote(e.target.dataset.id);
    });

    document.addEventListener('keydown', e => {
      if (this.$.hintModalOverlay.classList.contains('show') || this.$.wrongNoteModalOverlay.classList.contains('show') || document.getElementById('authOverlay').style.display !== 'none') return;
      if (e.key >= '0' && e.key <= '9') this.handleKeyPress(`NUM_${e.key}`);
      else if (e.key === 'Backspace') this.handleKeyPress('DEL');
      else if (e.key === 'Enter') this.handleKeyPress(this.state.isAnswerChecked ? 'NEXT' : 'CONFIRM');
    });
  },

  startTimer() {
    clearInterval(this.state.timerInterval);
    this.state.timerLeft = 15000;
    this.$.timerBar.style.transition = 'none';
    this.$.timerBar.style.width = '100%';
    this.$.timerBar.classList.remove('danger');
    
    void this.$.timerBar.offsetWidth;
    this.$.timerBar.style.transition = 'width 0.1s linear, background 0.3s';

    let lastTime = Date.now();
    this.state.timerInterval = setInterval(() => {
      if (this.state.isAnswerChecked) { clearInterval(this.state.timerInterval); return; }
      
      const now = Date.now();
      this.state.timerLeft -= (now - lastTime);
      lastTime = now;

      if (this.state.timerLeft <= 0) {
        this.state.timerLeft = 0;
        clearInterval(this.state.timerInterval);
        this.$.timerBar.style.width = '0%';
        this.timeOutForceWrong();
      } else {
        const pct = (this.state.timerLeft / 15000) * 100;
        this.$.timerBar.style.width = `${pct}%`;
        if (pct < 30) this.$.timerBar.classList.add('danger');
      }
    }, 50);
  },

  timeOutForceWrong() {
    this.state.isAnswerChecked = true;
    this.state.score.streak = 0;
    this.state.score.wrong++;
    
    const q = this.state.currentQuestion;
    this.generateBeautifulWrongNote(q);
    
    this.renderAll(null);
    this.$.resultBanner.className = 'result-banner wrong-banner show';
    this.$.resultBanner.innerHTML = `<span style="color:var(--c-wrong)">⏰ 시간 초과!</span> <span style="font-weight:400; margin-left:10px;">연속 정답이 초기화되었습니다.</span> <button class="show-answer-btn">정답 확인</button>`;
  },

  handleKeyPress(key) {
    if (key.startsWith('NUM_') || key.startsWith('ELEM_') || key === 'DEL') {
      if (this.state.isAnswerChecked) return;
      const q = this.state.currentQuestion;
      if (!q || !q.activeKey) return;
      const input = q.inputs[q.activeKey] || '';
      
      if (key.startsWith('NUM_')) q.inputs[q.activeKey] = input + key.replace('NUM_', '');
      else if (key.startsWith('ELEM_')) {
        q.inputs[q.activeKey] = input + key.replace('ELEM_', '');
      }
      else if (key === 'DEL') q.inputs[q.activeKey] = input.slice(0, -1);
      
      this.renderEquation();
    } else if (key === 'CONFIRM') { if (!this.state.isAnswerChecked) this.checkAnswer();
    } else if (key === 'NEXT') { if (this.state.isAnswerChecked) this.generateQuestion(); }
  },

  setMode(mode) {
    if (this.state.currentMode === mode) return;
    this.state.currentMode = mode;
    this.$.modeTabs.querySelectorAll('.mode-tab').forEach(tab => { tab.classList.toggle('active', parseInt(tab.dataset.mode) === mode); });
    
    if (mode === 1) {
      this.$.elemRowLabel.style.display = 'none';
      this.$.elemRow.style.display = 'none';
    } else {
      this.$.elemRowLabel.style.display = 'block';
      this.$.elemRow.style.display = 'flex';
    }
    
    this.generateQuestion();
  },

  setActiveBlank(key) { if (this.state.isAnswerChecked) return; const q = this.state.currentQuestion; if (q) { q.activeKey = key; this.renderEquation(); } },

  generateQuestion() {
    this.state.isAnswerChecked = false; this.state.isAnswerRevealed = false;
    const q = { blanks: [], inputs: {} };
    const formulaToString = (chem) => { let str = chem.coef > 1 ? chem.coef.toString() : ''; str += chem.formula.map(p => p.sym + (p.sub ? p.sub.toString() : '')).join(''); return str; };

    switch (this.state.currentMode) {
      case 1:
        if (Math.random() < 0.5) {
            const tmpl = COEF_TEMPLATES[Math.floor(Math.random() * COEF_TEMPLATES.length)];
            const data = tmpl.gen(); q.name = tmpl.label; q.isAbstract = true;
            q.displayReactants = data.fmt.map(f => ({...f})); q.displayProducts = data.fmtP.map(f => ({...f}));
            data.fmt.forEach((f, i) => { if(f.coef > 1) { q.blanks.push({key: `R${i}`, answer: f.coef.toString()}); } });
            data.fmtP.forEach((f, i) => { if(f.coef > 1) { q.blanks.push({key: `P${i}`, answer: f.coef.toString()}); } });
        } else {
            const validRx = REACTIONS.filter(r => r.reactants.some(x => x.coef > 1) || r.products.some(x => x.coef > 1));
            const rx = validRx[Math.floor(Math.random() * validRx.length)];
            q.name = rx.name; q.isAbstract = false;
            q.displayReactants = rx.reactants.map(f => ({...f})); q.displayProducts = rx.products.map(f => ({...f}));
            rx.reactants.forEach((r, i) => { if(r.coef > 1) { q.blanks.push({key: `R${i}`, answer: r.coef.toString()}); } });
            rx.products.forEach((p, i) => { if(p.coef > 1) { q.blanks.push({key: `P${i}`, answer: p.coef.toString()}); } });
        }
        q.type = '계수 맞추기';
        break;
      case 2:
        const rx2 = REACTIONS[Math.floor(Math.random() * REACTIONS.length)]; q.reaction = rx2; q.name = rx2.name; q.type = '반응물 맞추기';
        q.displayReactants = rx2.reactants.map(r => ({...r, isBlank: true})); q.displayProducts = rx2.products.map(p => ({...p, isBlank: false}));
        rx2.reactants.forEach((r, i) => q.blanks.push({ key: `R${i}`, answer: formulaToString(r) }));
        break;
      case 3:
        const rx3 = REACTIONS[Math.floor(Math.random() * REACTIONS.length)]; q.reaction = rx3; q.name = rx3.name; q.type = '생성물 맞추기';
        q.displayReactants = rx3.reactants.map(r => ({...r, isBlank: false})); q.displayProducts = rx3.products.map(p => ({...p, isBlank: true}));
        rx3.products.forEach((p, i) => q.blanks.push({ key: `P${i}`, answer: formulaToString(p) }));
        break;
      case 4:
        const rx4 = REACTIONS[Math.floor(Math.random() * REACTIONS.length)]; q.reaction = rx4; q.name = rx4.name; q.type = '전체 반응식';
        q.displayReactants = rx4.reactants.map(r => ({...r, isBlank: true})); q.displayProducts = rx4.products.map(p => ({...p, isBlank: true}));
        rx4.reactants.forEach((r, i) => q.blanks.push({ key: `R${i}`, answer: formulaToString(r) }));
        rx4.products.forEach((p, i) => q.blanks.push({ key: `P${i}`, answer: formulaToString(p) }));
        break;
      case 5:
        const chem = CHEMICALS[Math.floor(Math.random() * CHEMICALS.length)];
        q.name = chem.name; q.type = '화학식 암기';
        q.isMode5 = true;
        const fStr = chem.formula.map(p => p.sym + (p.sub ? p.sub.toString() : '')).join('');
        q.blanks.push({ key: 'M5', answer: fStr });
        break;
    }
    if (q.blanks.length > 0) q.activeKey = q.blanks[0].key;
    this.state.currentQuestion = q; 
    
    this.renderAll();
    this.startTimer();
  },

  checkAnswer() {
    const q = this.state.currentQuestion; if (!q) return;
    this.state.isAnswerChecked = true; 
    let allCorrect = true;
    let hasCoefficientOneError = false;

    q.blanks.forEach(b => { 
      const val = q.inputs[b.key] || '';
      if (val !== b.answer) {
        allCorrect = false;
        if (this.state.currentMode !== 1 && val === '1' + b.answer) {
          hasCoefficientOneError = true;
        }
      } 
    });
    
    if (allCorrect) { 
      this.state.score.streak++; this.state.score.correct++; 
    } else { 
      this.state.score.streak = 0; this.state.score.wrong++; 
      this.generateBeautifulWrongNote(q);
      q.coefOneErrorFlag = hasCoefficientOneError;
    }
    
    clearInterval(this.state.timerInterval);
    this.renderAll(allCorrect);
  },

  generateBeautifulWrongNote(q) {
    let fullEqHtml = '';
    if (q.isMode5) {
      fullEqHtml = `<span class="eq-text" style="font-size:20px; font-weight:bold; color:var(--c-correct);">${this.formatInput(q.blanks[0].answer)}</span>`;
    } else {
      const formatSide = (side) => side.map(c => (c.coef > 1 ? `<span class="eq-text">${c.coef}</span>` : '') + c.formula.map(p => p.sym + (p.sub ? `<sub>${p.sub}</sub>` : '')).join('')).join(' <span class="eq-plus">+</span> ');
      if(!q.isAbstract) {
        const rx = REACTIONS.find(r => r.name === q.name);
        fullEqHtml = `${formatSide(rx.reactants)} <span class="eq-arrow">→</span> ${formatSide(rx.products)}`;
      } else {
        const rSide = q.displayReactants.map(c => (c.coef>1?`<span class="eq-text">${c.coef}</span>`:'') + this.formatFormula(c.formula)).join(' <span class="eq-plus">+</span> ');
        const pSide = q.displayProducts.map(c => (c.coef>1?`<span class="eq-text">${c.coef}</span>`:'') + this.formatFormula(c.formula)).join(' <span class="eq-plus">+</span> ');
        fullEqHtml = `${rSide} <span class="eq-arrow">→</span> ${pSide}`;
      }
    }
    this.saveWrongNote(this.state.currentMode, q.name, fullEqHtml);
  },

  revealAnswers() { this.state.isAnswerRevealed = true; this.renderEquation(); this.renderResultBanner(false); },

  renderAll(isCorrect = null) {
    this.renderScore(); this.renderQuestionHeader(); this.renderEquation(); this.renderKeyboard();
    if (isCorrect !== null) this.renderResultBanner(isCorrect); else this.$.resultBanner.className = 'result-banner';
  },

  renderScore() {
    const { streak, correct, wrong } = this.state.score;
    const bump = (el) => { el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 200); };
    if (this.$.streakCount.textContent !== streak.toString()) { this.$.streakCount.textContent = streak; bump(this.$.streakCount); }
    if (this.$.totalCorrect.textContent !== correct.toString()) { this.$.totalCorrect.textContent = correct; bump(this.$.totalCorrect); }
    if (this.$.totalWrong.textContent !== wrong.toString()) { this.$.totalWrong.textContent = wrong; bump(this.$.totalWrong); }
    if (streak >= 10) this.$.streakFlames.textContent = '🔥🔥🔥'; else if (streak >= 5) this.$.streakFlames.textContent = '🔥🔥'; else if (streak >= 3) this.$.streakFlames.textContent = '🔥'; else this.$.streakFlames.textContent = '';
  },

  renderQuestionHeader() { const q = this.state.currentQuestion; if (!q) return; this.$.qLabel.textContent = `MODE ${this.state.currentMode} · ${q.type}`; this.$.qSubLabel.textContent = q.name; },

  renderEquation() {
    const q = this.state.currentQuestion; if (!q) { this.$.equationDisplay.innerHTML = ''; return; }
    
    if (q.isMode5) {
      this.$.equationDisplay.innerHTML = this.renderBlankBox('M5', q.blanks[0].answer);
      return;
    }

    const formatChemical = (chemList, keyPrefix) => {
      return chemList.map((c, i) => {
        const key = `${keyPrefix}${i}`;
        const blankData = q.blanks.find(b => b.key === key);
        
        if (this.state.currentMode === 1) {
          if (blankData) {
            return this.renderBlankBox(key, blankData.answer) + this.formatFormula(c.formula);
          } else {
            return this.formatFormula(c.formula);
          }
        } else {
          if (c.isBlank || blankData) {
            return this.renderBlankBox(key, blankData ? blankData.answer : '');
          } else {
            const coefStr = c.coef > 1 ? `<span class="eq-text">${c.coef}</span>` : '';
            return coefStr + this.formatFormula(c.formula);
          }
        }
      }).join(' <span class="eq-plus">+</span> ');
    };
    
    this.$.equationDisplay.innerHTML = `${formatChemical(q.displayReactants, 'R')} <span class="eq-arrow">→</span> ${formatChemical(q.displayProducts, 'P')}`;
  },

  renderBlankBox(key, answer) {
    const q = this.state.currentQuestion; const input = q.inputs[key] || ''; let classes = 'blank-box';
    if (q.activeKey === key && !this.state.isAnswerChecked) classes += ' active';
    let displayContent = this.formatInput(input);
    if (this.state.isAnswerChecked) {
      const isCorrect = input === answer; classes += isCorrect ? ' correct' : ' wrong';
      if (this.state.isAnswerRevealed && !isCorrect) displayContent = this.formatInput(answer);
    }
    if (input === '' && !this.state.isAnswerChecked) classes += ' placeholder';
    return `<span class="${classes}" data-key="${key}">${displayContent}</span>`;
  },

  renderResultBanner(isCorrect) {
    if (isCorrect) { 
      this.$.resultBanner.className = 'result-banner correct-banner show'; 
      this.$.resultBanner.innerHTML = `✅ 정답입니다! 연속 ${this.state.score.streak}회 성공!`;
    } else {
      this.$.resultBanner.className = 'result-banner wrong-banner show';
      
      let errorWarningHtml = '';
      if (this.state.currentQuestion.coefOneErrorFlag) {
        errorWarningHtml = `<div style="color:var(--c-wrong); font-size:13px; margin-bottom:8px; width:100%;">⚠️ 주의: 화학에서 계수 '1'은 생략해야 합니다.</div>`;
      }

      if (this.state.isAnswerRevealed) { 
        this.$.resultBanner.innerHTML = `${errorWarningHtml}<div style="display:flex; align-items:center; width:100%;">❌ 오답입니다. 정답이 표시되었습니다.</div>`;
      } else { 
        this.$.resultBanner.innerHTML = `${errorWarningHtml}<div style="display:flex; align-items:center; width:100%; justify-content:space-between;"><span>❌ 오답입니다.</span><button class="show-answer-btn">정답 확인</button></div>`; 
      }
    }
  },

  renderKeyboard() { const isChecked = this.state.isAnswerChecked; this.$.confirmBtn.style.display = isChecked ? 'none' : 'flex'; this.$.nextBtn.style.display = isChecked ? 'flex' : 'none'; },

  formatFormula(formula) { return formula.map(p => p.sym + (p.sub ? `<sub>${p.sub}</sub>` : '')).join(''); },
  formatInput(str) { if (!str) return ''; return str.replace(/([a-zA-Z]+)(\d+)/g, '$1<sub>$2</sub>'); },
  toggleTheme() { this.state.isDarkMode = !this.state.isDarkMode; document.body.classList.toggle('light', !this.state.isDarkMode); document.getElementById('themeBtn').textContent = this.state.isDarkMode ? '🌙' : '☀️'; }
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
